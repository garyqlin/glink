# ══════════════════════════════════════════════════════════
# Glink Daemon Config
# Precedence: glink-config.yaml > env vars > defaults
# ══════════════════════════════════════════════════════════

# ── Project ────────────────────────────────────────────────
project:
  # Default workflow project (also configurable via CLI or GLINK_DEFAULT_PROJECT)
  default: hello-world

# ── Scheduling ─────────────────────────────────────────────
scheduling:
  # Max retries per step (default: 2)
  max_retries: 2
  # Dependency poll interval (seconds)
  poll_interval: 3
  # Dependency poll timeout (seconds)
  poll_max_wait: 180
  # Max concurrent steps (1 = serial execution)
  max_concurrent_steps: 1

# ── Reporting ──────────────────────────────────────────────
reporting:
  # Channel list. Supported: console / webhook / silent
  # Multiple channels create a MultiReporter automatically
  channels:
    - type: console
      label: "Glink"

    # To enable webhook notifications (e.g. Slack, Discord, custom):
    # - type: webhook
    #   url: "https://hooks.slack.com/services/xxx"
    #   label: "Slack"

  # Alert severity threshold: green / yellow / red
  # Alerts below this severity are suppressed
  min_alert_severity: yellow

# ── API Server ─────────────────────────────────────────────
server:
  host: "127.0.0.1"
  port: 8426
  # SSE heartbeat interval (seconds)
  sse_heartbeat: 60
  # SSE poll interval (seconds)
  sse_poll_interval: 2

# ── Security ───────────────────────────────────────────────
security:
  # PID file path (auto-detected if empty)
  pidfile: ""
  # Startup timeout (seconds)
  startup_timeout: 10

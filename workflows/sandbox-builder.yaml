name: sandbox-builder
version: 1.0.0
description: "3D sandbox builder game — multi-agent pipeline example"

global_context: |
  You are a 3D game development expert. Output: single self-contained HTML file.

  Tech stack:
  - Three.js r160 (unpkg CDN) + Cannon-es (CDN) + OrbitControls
  - Single HTML file, double-click to play
  - Voxel blocks, 6 materials

  Materials: grass / dirt / wood / stone / brick / glass

  Rules:
  - All code inlined to single HTML
  - Sections separated by // === SECTION NAME ===
  - Descriptive naming

steps:
  - id: step-1
    executor: agent-1
    title: Scene initialization
    description: Three.js scene + camera + lighting + render loop + OrbitControls + fog
    output_file: projects/sandbox-builder/scene.html
    task: |
      Create base HTML structure for a sandbox building game.

  - id: step-2
    executor: agent-2
    title: Block placement
    description: Raycasting + grid snap + 6 materials
    input_file: projects/sandbox-builder/scene.html
    output_file: projects/sandbox-builder/blocks.html
    task: |
      Add block placement system. Raycasting, grid-based placement, left-click place / right-click delete.

  - id: step-3
    executor: agent-2
    title: Procedural textures
    description: Canvas-generated textures for all 6 materials
    input_file: projects/sandbox-builder/blocks.html
    output_file: projects/sandbox-builder/textures.html
    task: |
      Generate pixel-style textures via Canvas 2D API.

  - id: step-4
    executor: agent-2
    title: Physics
    description: Cannon-es gravity + collision + body sync
    input_file: projects/sandbox-builder/textures.html
    output_file: projects/sandbox-builder/physics.html
    task: |
      Integrate Cannon-es physics engine.

  - id: step-5
    executor: agent-3
    title: Game UI
    description: Material toolbar + score panel + glassmorphism style
    input_file: projects/sandbox-builder/physics.html
    output_file: projects/sandbox-builder/ui.html
    task: |
      Add glassmorphism UI overlay.

  - id: step-6
    executor: agent-3
    title: Menu and end screens
    description: Start menu + game over screen + achievements
    input_file: projects/sandbox-builder/ui.html
    output_file: projects/sandbox-builder/game.html
    task: |
      Add start menu and game-over screen.

  - id: step-7
    executor: agent-4
    title: Save / load system
    description: localStorage 3-slot save/load/delete
    fallback_agents: [agent-1]
    input_file: projects/sandbox-builder/game.html
    output_file: projects/sandbox-builder/final.html
    task: |
      Add localStorage save/load with 3 slots.

  - id: step-8
    executor: agent-4
    title: Scoring + achievements
    description: Scoring logic + 6 achievement badges
    input_file: projects/sandbox-builder/final.html
    output_file: projects/sandbox-builder/complete.html
    task: |
      Add scoring system and achievement tracking.

  - id: step-9
    executor: agent-5
    title: Test & verify
    description: Full pipeline verification
    input_file: projects/sandbox-builder/complete.html
    output_file: projects/sandbox-builder/sandbox-builder.html
    task: |
      Full testing checklist.
      Issues found should be fixed. Overwrite final output file.

  - id: step-10
    executor: agent-5
    title: Code quality review
    description: Static analysis + security review
    fallback_agents: [agent-1]
    input_file: projects/sandbox-builder/sandbox-builder.html
    output_file: projects/sandbox-builder/QUALITY_REPORT.md
    task: |
      Run comprehensive code review. Output quality report.

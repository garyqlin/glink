name: sandbox-builder
version: 0.2.0
description: 3D沙盒建造游戏 — 战甲流水线 (Forge编入)

global_context: |
  你是一个3D游戏开发专家。utput: 单 HTML 文件

  ## 技术栈
  - Three.js r160 (unpkg CDN) + Cannon-es (CDN) + OrbitControls
  - 单 HTML 文件，双击即玩
  - 体素方块，类 Minecraft 简化版，6种材质

  ## 六种材质
  grass / dirt / wood / stone / brick / glass

  ## 所有战甲遵守
  - 所有代码内联到单 HTML
  - CDN：three.module.js r160 + OrbitControls + cannon-es
  - 注释 // === SECTION NAME === 分隔
  - 语义化命名，中文注释

steps:
  - id: step-1
    executor: 重锤
    fallback_agents: ["标准版"]
    title: 场景初始化
    description: Three.js 场景 + 相机 + 光照 + 渲染循环 + OrbitControls + 雾效
    output_file: projects/sandbox-builder/sandbox-builder-step1.html
    task: |
      创建沙盒建造游戏 HTML 文件基础结构。
      详细需求见 global_context 和原 workflow。
      CDN：three@0.160.0 + OrbitControls + cannon-es@0.20.0
      场景：无限平地，PerspectiveCamera(60°, 宽高比, 0.1, 1000) 初始 (10, 8, 10)
      光照：Ambient + Directional 投射阴影
      WebGLRenderer PCFSoftShadowMap + antialias
      OrbitControls 限制仰角 5°~85°，禁止平移
      背景 0x87CEEB，Fog(0x87CEEB, 30, 150)
      window resize 响应
      requestAnimationFrame 渲染循环

  - id: step-2
    executor: 重锤
    fallback_agents: ["标准版"]
    title: 方块放置系统
    description: Raycasting + 网格吸附 + 6种材质(MeshStandardMaterial) + 左键放置/右键删除 + 音效
    output_file: projects/sandbox-builder/sandbox-builder-step2.html
    input_file: projects/sandbox-builder/sandbox-builder-step1.html
    task: |
      在 step-1 基础上添加方块放置系统。
      完整读取 input_file，在其代码基础上修改。
      blocks[] 数组，GRID_SIZE=1，范围 -20~20
      6种颜色材质（grass/dirt/wood/stone/brick/glass）
      Raycasting 与地面交点和方块表面相交 → 网格吸附放置
      左键放置，右键删除，高度限制 <20
      GridHelper 显示
      Web Audio API 简单 beep 音效

  - id: step-3
    executor: 重锤
    fallback_agents: ["标准版"]
    title: 程序生成贴图
    description: Canvas 2D 程序生成 6 种材质 diffuse 贴图 + MeshStandardMaterial 配置
    output_file: projects/sandbox-builder/sandbox-builder-step3.html
    input_file: projects/sandbox-builder/sandbox-builder-step2.html
    task: |
      在 step-2 基础上用 Canvas 2D 程序生成材质贴图。
      六种材质各生成函数：generateGrassTexture() / generateDirtTexture() / 等
      Canvas 绘制像素风图案，转 base64 data URL
      配置各材质 roughness/metalness/transparent
      缓存已生成的 texture
      更新工具栏材质图标 Canvas 缩略图

  - id: step-4
    executor: 重锤
    fallback_agents: ["标准版"]
    title: 物理系统
    description: Cannon-es 重力 + 碰撞 + 方块物理 Body 同步 + 物理步长 1/60
    output_file: projects/sandbox-builder/sandbox-builder-step4.html
    input_file: projects/sandbox-builder/sandbox-builder-step3.html
    task: |
      在 step-3 基础上加 Cannon-es 物理。
      world gravity (0,-20,0)，地面 plane 物理体(mass 0)
      方块 Box(mass 1) 物理 Body 与 Three Mesh 位置同步
      放置时创建物理体，0.3s 后锁定
      删除时移除 body
      渲染循环中 body.position → mesh.position

  - id: step-5
    executor: 绘墨
    fallback_agents: ["重锤"]
    title: 游戏 UI
    description: 材质工具栏 + 分数面板 + 建筑统计 + 操作提示 (glassmorphism 风格)
    output_file: projects/sandbox-builder/sandbox-builder-step5.html
    input_file: projects/sandbox-builder/sandbox-builder-step4.html
    task: |
      在 step-4 基础上添加完整 UI。
      HTML overlay 层：左上分数面板、右上建筑统计、底部材质工具栏
      工具栏 6 圆角按钮 50×50，当前选中金色边框，键盘 1-6 切换
      分数面板玻璃拟态 backdrop-filter blur 8px
      操作提示 3s 淡出
      材质切换同步更新 UI 高亮 + 音效

  - id: step-6
    executor: 绘墨
    fallback_agents: ["重锤"]
    title: 开始菜单 + 结束画面
    description: 全屏开始菜单 + 游戏结束统计 + 成就展示 + ESC退出
    output_file: projects/sandbox-builder/sandbox-builder.html
    input_file: projects/sandbox-builder/sandbox-builder-step5.html
    task: |
      在 step-5 基础上加开始菜单和结束画面。
      开始菜单：标题「🧱 沙盒建造师」+ 开始按钮 + 玩法说明
      结束画面：统计(方块数/材质种类/时间) + 成就徽章 + 保存/读取/重玩
      ESC 退出确认
      最终输出文件名 sandbox-builder.html

  - id: step-7
    executor: 大黄蜂
    fallback_agents: ["标准版"]
    title: 保存/读取系统
    description: localStorage 3 槽位保存/读取/删除 + 槽位选择 UI
    output_file: projects/sandbox-builder/sandbox-builder-step7.html
    input_file: projects/sandbox-builder/sandbox-builder.html
    task: |
      在 sandbox-builder.html 基础上加 localStorage 保存系统。
      3 槽位：sandbox_save_1/2/3
      数据格式：{blocks, score, date, name}
      提供 saveGame(slot) / loadGame(slot) / deleteGame(slot)
      槽位 UI：显示名称/方块数/日期/空槽位
      读取后重建 Three.js Mesh

  - id: step-8
    executor: 大黄蜂
    fallback_agents: ["标准版"]
    title: 计分系统 + 成就
    description: 计分逻辑 + 6种成就徽章 + 最高分记录 + 分数跳数动画
    output_file: projects/sandbox-builder/sandbox-builder-final.html
    input_file: projects/sandbox-builder/sandbox-builder-step7.html
    task: |
      完善计分和成就系统。
      计分：放置+1，相邻>5块+10，材质>3种+15，保存+20，删除-1
      6 种成就：建筑新星(>10)/多样创作者(>3材质)/沙盒大师(>50)/高楼建造(Y>5)/精密建筑师(>5材质)
      localStorage sandbox_highscore 最高分
      成就解锁 CSS keyframe 动画 + 音效
      分数跳数效果

  - id: step-9
    executor: Laser
    fallback_agents: ["标准版"]
    title: 测试验证
    description: 全流程测试：CDN可达性、HTML语法、关键代码段、功能覆盖率
    output_file: projects/sandbox-builder/sandbox-builder.html
    input_file: projects/sandbox-builder/sandbox-builder-final.html
    task: |
      全面测试和验证 final 版本。测试清单：
      1. 文件存在且 >50KB
      2. CDN 资源 curl 检测可达
      3. HTML 标签平衡、JS 括号匹配
      4. 代码段完整性检查（Three.js init / 6种材质 / Raycasting / UI / 保存 / 计分 / 开始菜单 / 结束画面）
      5. GET → 200
      6. 问题修复，最终覆盖 sandbox-builder.html
      7. 输出测试报告

  - id: step-10
    executor: forge
    fallback_agents: [标准版, Laser]
    title: 最终代码质检
    description: Forge 对最终版做完整白盒+黑盒代码审查，forge_verify() 六项验证
    output_file: projects/sandbox-builder/QUALITY_REPORT.md
    input_file: projects/sandbox-builder/sandbox-builder.html
    task: |
      对最终版 sandbox-builder.html 做完整代码质量审查。

      审查要求：
      1. forge_verify() 运行六项检查：语法/格式/lint/死代码/命名/可读性
      2. 白盒分析：
         - 函数覆盖（每个函数/方法/闭包的调用关系）
         - 变量命名一致性
         - 异常处理（try/catch 覆盖范围）
         - 内存泄漏（DOM 引用、事件监听器未清理、requestAnimationFrame 重复启动）
         - 性能（CSS 重排大量 DOM 操作、Raycasting 高频优化）
         - 安全（localStorage XSS、innerHTML、eval）
      3. 黑盒测试（思维实验）：
         - localStorage 满 → 写入失败表现
         - 快速连续放置 → 物理同步一致性
         - 多窗口打开 → localStorage 竞争
         - 浏览器窗口缩放到极致 → UI 布局变形
         - 删除所有方块 → 场景行为正常
         - 关闭 JS → 降级显示
      4. 修改建议（如有安全问题直接修复代码）
      5. 输出 QUALITY_REPORT.md（Markdown 格式，包含分数+问题列表+修复建议）

      重要：本步骤只做审查和报告，不做功能修改（安全问题除外）。

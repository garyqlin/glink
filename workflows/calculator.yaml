project:
  name: calculator
  title: Web 计算器应用
  goal: Build a calculator web app with HTML/CSS/JS and a code review
steps:
- id: step-1
  executor: 重锤
  fallback_agents:
  - 标准版
  title: UI Layout & Styling
  task: 'Build the calculator shell in pure HTML/CSS: a display screen at top, a 4x5
    button grid (digits 0-9, operators +-*/=, clear), responsive centered layout with
    dark theme styling. No JavaScript logic yet — static HTML/CSS skeleton only.

    '
  output_file: projects/calculator/calculator-step1.html
- id: step-2
  executor: 重锤
  fallback_agents:
  - 标准版
  title: Core Calculator Logic
  description: 'Wire up all button event listeners with JavaScript: digit input, operator
    chaining, clear, equals evaluation, edge cases (division by zero, leading zeros,
    decimal handling). Keyboard support for digits and operators.

    '
  input_file: projects/calculator/calculator-step1.html
  output_file: projects/calculator/calculator-step2.html
  depends_on:
  - step-1
- id: step-3
  executor: 大黄蜂
  fallback_agents:
  - 标准版
  title: Black-Box Testing
  description: 'Test every button and edge case manually against the rendered page:
    basic arithmetic, chained operations, clear, division by zero, decimal precision,
    keyboard input, negative results. Log all failures for step-4 review.

    '
  input_file: projects/calculator/calculator-step2.html
  output_file: projects/calculator/calculator-test-report.md
  depends_on:
  - step-2
- id: step-4
  executor: Laser
  fallback_agents:
  - 标准版
  type: review
  title: Final Code Review & QA Sign-Off
  description: 'Review combined HTML/CSS/JS for code quality, security (no eval abuse),
    accessibility (aria labels, tab order), responsiveness. Cross-check test report
    from step-3 — all issues must be resolved or documented. Emit final pass/fail
    verdict.

    '
  input_file: projects/calculator/calculator-step2.html
  depends_on:
  - step-3

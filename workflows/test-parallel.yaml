project:
  name: test-parallel
  title: Parallel Test
  goal: Verify independent steps run concurrently
  mode: parallel
steps:
  - id: step-1
    executor: 标准版
    title: Step A - no deps
    task: 'Write a short file saying "Step A started at $(date)". Output to /tmp/glink-test-a.txt'
    output_file: /tmp/glink-test-a.txt
  - id: step-2
    executor: 标准版
    title: Step B - depends on A
    task: 'Read /tmp/glink-test-a.txt and explain what you found'
    input_file: /tmp/glink-test-a.txt
    depends_on:
      - step-1
  - id: step-3
    executor: 标准版
    title: Step C - no deps (parallel with A)
    task: 'Write a short file saying "Step C started at $(date)". Output to /tmp/glink-test-c.txt'
    output_file: /tmp/glink-test-c.txt

name: testglink
version: 1.0.0
description: "Glink full-pipeline integration test"

steps:
  - title: "Requirements analysis"
    executor: "agent-1"
    stage: "analysis"
    description: |
      Read and analyze the project requirements document.
      Output analysis to bus.
    optional: false

  - title: "Database audit & migration"
    executor: "agent-2"
    stage: "database"
    description: |
      1. Audit existing database schema
      2. Compare against requirements
      3. Generate migration script
      4. Execute migration
    optional: false

  - title: "API implementation"
    executor: "agent-2"
    stage: "api"
    description: |
      Implement missing API endpoints based on requirements.
      Ensure all routes, controllers, and middleware are complete.
    optional: false

  - title: "Frontend development"
    executor: "agent-3"
    fallback_agents: [agent-2]
    stage: "frontend"
    description: |
      Develop admin frontend pages.
      Ensure API integration is correct.
    optional: false

  - title: "Data seeding"
    executor: "agent-4"
    stage: "data-seed"
    description: |
      Populate demo data for all core tables.
      At least 100 records across entities.
    optional: false

  - title: "Integration testing"
    executor: "agent-5"
    stage: "testing"
    description: |
      Full integration test: all APIs, edge cases, auth.
      Output test report.
    optional: false

  - title: "Requirements verification"
    executor: "agent-1"
    stage: "verify"
    description: |
      Compare delivery against requirements checklist.
      Target: 100% completion rate.
      Output verification report.
    optional: false

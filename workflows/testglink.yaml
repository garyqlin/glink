# Glink 工作流 — testglink
# 诺保科CRM 全流程升级
# 基于: 客户确认-工作清单.md + 需求文档原文.md

project:
  title: "诺保科CRM — Glink 全流程试验"
  goal: "基于需求文档对 CRM 进行全量升级，验证 Glink + Main Bus 跨 Agent 协作"

steps:
  # ──── 阶段1: 分析消化 ────
  - title: "需求分析 — 消化两份需求文档"
    executor: "标准版"
    fallback_agents:
        - "大黄蜂"
        - "Laser"
    stage: "analysis"
    description: |
      阅读 `/Users/gary/Projects/nuoboke-project/客户确认-工作清单.md` 和
      `/Users/gary/.qclaw/workspace/projects/nuobaoke-crm/需求文档原文.md`，
      理解项目全貌、补全范围、优先级排序。
      将分析结论写入 `/Users/gary/opprime/glink/bus/projects/testglink-analysis.md`。
    optional: false

  # ──── 阶段2: 数据库模型升级 ────
  - title: "数据库结构审计与升级 — 对齐需求文档"
    executor: "重锤"
    fallback_agents:
        - "标准版"
        - "Laser"
    stage: "database"
    description: |
      1. 审计现有数据库结构（`/Users/gary/Projects/nuoboke-project/deploy/nuoboke.sql`）
      2. 对比需求文档，找出缺失字段和表
      3. 生成迁移脚本（`database/migrations/` 下新 migration）
      4. 执行迁移
      5. 写入 Bus 记录变更
    optional: false

  # ──── 阶段3: 后台 API 补全 ────
  - title: "后台 API 补全 — 未实现的接口"
    executor: "重锤"
    fallback_agents:
        - "标准版"
        - "Laser"
    stage: "api"
    description: |
      按照需求检查清单，补全后台 API：
      - PUT /admin/visits/{id}/status（拜访状态变更）
      - 审批相关接口（approve）
      - 日报统计接口（report）
      确保所有路由注册、controller 完整、权限中间件正确
    optional: false

  # ──── 阶段4: 后台管理页面 ────
  - title: "后台管理页面 — layuimini 前端开发"
    executor: "绘墨"
    fallback_agents:
        - "重锤"
        - "标准版"
    stage: "frontend-admin"
    description: |
      开发后台管理前端页面（layuimini）：
      - 审批管理页面（approve/list.html + approve/detail.html）
      - 日报统计页面（report/daily.html + report/monthly.html）
      - 系统设置页面（setting/index.html）
      确保API对接完整、数据展示正确
    depends_on: [api]
    optional: false

  # ──── 阶段5: 小程序补全 ────
  - title: "小程序功能补全 — WeChat Mini Program"
    executor: "Laser"
    fallback_agents:
        - "大黄蜂"
        - "标准版"
    stage: "weapp"
    description: |
      补全微信小程序剩余功能：
      - 手术跟台创建页 + 详情页
      - 会议举办创建页 + 详情页
      - 派单任务完成流程
      - 医院/医生详情补全
      路径：/Users/gary/Projects/nuoboke-project/source/nuoboke-weapp/
    optional: false

  # ──── 阶段6: 演示数据 ────
  - title: "填充演示数据 — 全量测试数据"
    executor: "大黄蜂"
    fallback_agents:
        - "标准版"
        - "重锤"
    stage: "data-seed"
    description: |
      填充足够演示数据：
      - 至少 100 条拜访记录（含签到/签出/补签）
      - 30 家医院 + 50 位医生
      - 20 个销售用户 + 5 个经理 + 1 个管理员
      - 覆盖正常流程 + 异常场景
    optional: false

  # ──── 阶段7: 集成测试 ────
  - title: "全流程集成测试 — API 测试 + 页面渲染"
    executor: "Laser"
    fallback_agents:
        - "大黄蜂"
        - "标准版"
    stage: "testing"
    description: |
      全量流程测试：
      - 每条 API 逐条测试（200/401/异常参数）
      - 模拟客户典型使用流程
      - 验证前端页面正常渲染
      - 验证安全边界
      产出测试报告到 Bus
    optional: false

  # ──── 阶段8: 需求对比 ────
  - title: "需求 vs 交付 对比验收"
    executor: "标准版"
    fallback_agents:
        - "大黄蜂"
        - "Laser"
    stage: "verify"
    description: |
      对照 `客户确认-工作清单.md` 逐条确认完成状态：
      - 🅰 后台管理 20 项
      - 🅱 权限分离 4 项
      - 🅲 小程序补全 5 项
      产出完成率报告，不满足 100% 的不提交
      报告写入 `/Users/gary/opprime/glink/bus/projects/testglink-verify.md`
    optional: false

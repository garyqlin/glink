<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沙盒建造游戏 - Step2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #canvas-container { width: 100%; height: 100%; display: block; }
    #info {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      background: rgba(0,0,0,0.45);
      padding: 8px 20px;
      border-radius: 20px;
      pointer-events: none;
      user-select: none;
    }
    #block-hud {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.55);
      padding: 8px 14px;
      border-radius: 24px;
      pointer-events: none;
      user-select: none;
    }
    #block-hud .slot {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.15);
      transition: border-color 0.15s;
    }
    #block-hud .slot.active {
      border-color: #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <!-- === HTML STRUCTURE === -->
  <div id="canvas-container"></div>
  <div id="info">🖱 左键放置 | 🖱 右键删除 | 沙盒建造 · Step2</div>

  <!-- === BLOCK HUD === -->
  <div id="block-hud">
    <div class="slot active" style="background:#4CAF50;" title="草方块 (1)"></div>
    <div class="slot" style="background:#795548;" title="泥土 (2)"></div>
    <div class="slot" style="background:#8D6E63;" title="木材 (3)"></div>
    <div class="slot" style="background:#9E9E9E;" title="石头 (4)"></div>
    <div class="slot" style="background:#C62828;" title="砖块 (5)"></div>
    <div class="slot" style="background:rgba(129,212,250,0.55);" title="玻璃 (6)"></div>
  </div>

  <!-- === THREE.JS IMPORT MAP === -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- === CANNON-ES (UMD → window.CANNON) === -->
  <script src="https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"></script>

  <!-- === MAIN SCRIPT (ESM) === -->
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ============================================================
    // === DOM REFS ===
    // ============================================================
    const container = document.getElementById('canvas-container');

    // ============================================================
    // === SCENE SETUP ===
    // ============================================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 30, 150);

    // ============================================================
    // === CAMERA ===
    // ============================================================
    const camera = new THREE.PerspectiveCamera(
      60,                                       // FOV
      container.clientWidth / container.clientHeight, // Aspect
      0.1,                                      // Near
      1000                                      // Far
    );
    camera.position.set(10, 8, 10);
    camera.lookAt(0, 0, 0);

    // ============================================================
    // === RENDERER ===
    // ============================================================
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // ============================================================
    // === ORBIT CONTROLS ===
    // ============================================================
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.enablePan = false;                     // 禁止平移
    controls.enableRotate = true;                   // 允许旋转
    controls.enableZoom = true;                     // 允许缩放
    controls.minPolarAngle = THREE.MathUtils.degToRad(5);   // 仰角下限 5°
    controls.maxPolarAngle = THREE.MathUtils.degToRad(85);  // 仰角上限 85°
    controls.target.set(0, 0, 0);
    controls.update();

    // ============================================================
    // === LIGHTING ===
    // ============================================================
    // Ambient — 基础环境光
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    // Directional — 主方向光 (模拟太阳)
    const directionalLight = new THREE.DirectionalLight(0xffffee, 0.8);
    directionalLight.position.set(50, 100, 50);
    directionalLight.castShadow = true;

    // 阴影贴图配置
    directionalLight.shadow.mapSize.width = 2048;
    directionalLight.shadow.mapSize.height = 2048;
    directionalLight.shadow.camera.near = 0.5;
    directionalLight.shadow.camera.far = 200;
    directionalLight.shadow.camera.left = -60;
    directionalLight.shadow.camera.right = 60;
    directionalLight.shadow.camera.top = 60;
    directionalLight.shadow.camera.bottom = -60;
    directionalLight.shadow.bias = -0.0005;
    directionalLight.shadow.normalBias = 0.02;

    scene.add(directionalLight);

    // ============================================================
    // === GROUND — 草地平面 ===
    // ============================================================

    // 程序化草地纹理 (Canvas)
    function createGrassTexture(size = 512) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // 底色 — 草绿
      ctx.fillStyle = '#4a8c3f';
      ctx.fillRect(0, 0, size, size);

      // 随机草点纹理
      for (let i = 0; i < 8000; i++) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        // 颜色在深浅草绿间随机
        const shade = 100 + Math.floor(Math.random() * 80);
        const r = 30 + Math.floor(Math.random() * 40);
        const g = shade;
        const b = 20 + Math.floor(Math.random() * 30);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(x, y, 2 + Math.random() * 3, 2 + Math.random() * 3);
      }

      // 少量深色斑点模拟泥土/阴影
      for (let i = 0; i < 400; i++) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        const shade = 30 + Math.floor(Math.random() * 30);
        ctx.fillStyle = `rgba(${shade},${shade + 15},${shade},0.4)`;
        ctx.beginPath();
        ctx.arc(x, y, 2 + Math.random() * 6, 0, Math.PI * 2);
        ctx.fill();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(40, 40);    // 100×100的地面重复40次 ≈ 每2.5单位一个周期
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    const grassTexture = createGrassTexture();

    const groundGeometry = new THREE.PlaneGeometry(100, 100);
    const groundMaterial = new THREE.MeshStandardMaterial({
      map: grassTexture,
      roughness: 0.9,
      metalness: 0.0,
      color: new THREE.Color(0xffffff),  // 白色乘纹理原色
    });

    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;      // 放平
    ground.position.y = -0.01;             // 微低于y=0避免Z-fighting
    ground.receiveShadow = true;
    scene.add(ground);

    // ============================================================
    // === PHYSICS WORLD (Cannon-es) ===
    // ============================================================
    const CANNON = window.CANNON;

    const world = new CANNON.World();
    world.gravity.set(0, -9.82, 0);
    world.broadphase = new CANNON.NaiveBroadphase();
    world.solver.iterations = 10;
    world.defaultContactMaterial.restitution = 0.3;

    // 物理地面（静态）
    const groundBody = new CANNON.Body({
      type: CANNON.Body.STATIC,
      shape: new CANNON.Plane(),
    });
    groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0); // 放平
    world.addBody(groundBody);

    // 物理↔渲染同步用的数组（后续方块添加到这里）
    const physicsBodies = [];

    // ============================================================
    // === RENDER / PHYSICS LOOP ===
    // ============================================================
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      // 物理步进
      const delta = Math.min(clock.getDelta(), 0.1); // 防螺旋死亡
      world.step(1 / 60, delta, 3);

      // 同步物理体→渲染体
      for (const { mesh, body } of physicsBodies) {
        mesh.position.copy(body.position);
        mesh.quaternion.copy(body.quaternion);
      }

      // 控制器更新
      controls.update();

      // 渲染
      renderer.render(scene, camera);
    }

    animate();

    // ============================================================
    // === PLACEMENT SYSTEM ===
    // ============================================================

    // --- 常量 ---
    const GRID_SIZE = 1;
    const MAX_HEIGHT = 20;

    // --- 方块类型定义 ---
    const BLOCK_TYPES = {
      grass: { color: 0x4CAF50, name: '草方块', opacity: 1.0, roughness: 0.85 },
      dirt:  { color: 0x795548, name: '泥土',   opacity: 1.0, roughness: 0.9  },
      wood:  { color: 0x8D6E63, name: '木材',   opacity: 1.0, roughness: 0.7  },
      stone: { color: 0x9E9E9E, name: '石头',   opacity: 1.0, roughness: 0.6  },
      brick: { color: 0xC62828, name: '砖块',   opacity: 1.0, roughness: 0.75 },
      glass: { color: 0x81D4FA, name: '玻璃',   opacity: 0.45, roughness: 0.2 },
    };

    const BLOCK_TYPE_KEYS = Object.keys(BLOCK_TYPES); // ['grass','dirt','wood','stone','brick','glass']

    // --- 当前选中 ---
    let currentType = 'grass';

    // --- 方块存储 ---
    const blocks = []; // { mesh: THREE.Mesh, body: CANNON.Body, type: string }

    // --- 材质缓存（创建一次，复用） ---
    const blockMaterials = {};
    for (const [type, cfg] of Object.entries(BLOCK_TYPES)) {
      blockMaterials[type] = new THREE.MeshStandardMaterial({
        color: new THREE.Color(cfg.color),
        roughness: cfg.roughness,
        metalness: 0.0,
        transparent: cfg.opacity < 1.0,
        opacity: cfg.opacity,
      });
    }

    // --- 共享几何体（1x1x1方块） ---
    const blockGeometry = new THREE.BoxGeometry(GRID_SIZE, GRID_SIZE, GRID_SIZE);

    // --- GridHelper 网格辅助 ---
    const gridHelper = new THREE.GridHelper(40, 40, 0x666666, 0x999999);
    gridHelper.position.y = 0.001; // 略高于地面，避免Z-fighting
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.35;
    scene.add(gridHelper);

    // --- Raycaster 射线拾取 ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // 地平面 (y=0)
    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

    // 当前射线命中结果
    let currentIntersection = null; // { point, normal, object, mode }

    /**
     * 更新射线检测
     */
    function updateRaycaster(event) {
      // 归一化设备坐标
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      // 优先检测已有方块
      const blockMeshes = blocks.map(b => b.mesh);
      const blockHits = raycaster.intersectObjects(blockMeshes, false);

      if (blockHits.length > 0) {
        const hit = blockHits[0];
        currentIntersection = {
          point: hit.point.clone(),
          normal: hit.face.normal.clone(),
          object: hit.object,
          mode: 'block',
        };
        return;
      }

      // 无方块命中 → 检测地平面
      const groundTarget = new THREE.Vector3();
      const hitGround = raycaster.ray.intersectPlane(groundPlane, groundTarget);

      if (hitGround) {
        currentIntersection = {
          point: groundTarget.clone(),
          normal: new THREE.Vector3(0, 1, 0),
          object: null,
          mode: 'ground',
        };
      } else {
        currentIntersection = null;
      }
    }

    /**
     * 根据命中结果计算放置位置（网格吸附）
     */
    function getPlacementPosition(intersection) {
      const pos = new THREE.Vector3();

      if (intersection.mode === 'ground') {
        // 地面：XZ吸附到整数网格，Y固定0.5
        pos.x = Math.round(intersection.point.x);
        pos.y = 0.5;
        pos.z = Math.round(intersection.point.z);
      } else if (intersection.mode === 'block') {
        // 相邻面：从交点沿法线偏移1格
        pos.copy(intersection.point).add(
          intersection.normal.clone().multiplyScalar(GRID_SIZE)
        );
        // 对齐到整数网格
        pos.x = Math.round(pos.x);
        pos.y = Math.round(pos.y);
        pos.z = Math.round(pos.z);
      }

      return pos;
    }

    /**
     * 检查某位置是否已被占用
     */
    function isPositionOccupied(position) {
      for (const b of blocks) {
        if (b.mesh.position.distanceTo(position) < 0.1) return true;
      }
      return false;
    }

    /**
     * 放置方块
     * @returns {boolean} 是否成功
     */
    function placeBlock(type, position) {
      // 高度限制
      if (position.y >= MAX_HEIGHT) return false;
      // 不埋入地下
      if (position.y < 0.5) return false;
      // 不重复放置
      if (isPositionOccupied(position)) return false;

      // 渲染网格
      const mesh = new THREE.Mesh(blockGeometry, blockMaterials[type]);
      mesh.position.copy(position);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      // 物理体（静态——方块不移动，仅作为障碍物）
      const halfExtents = new CANNON.Vec3(0.5, 0.5, 0.5);
      const shape = new CANNON.Box(halfExtents);
      const body = new CANNON.Body({
        mass: 0, // 静态
        shape: shape,
      });
      body.position.set(position.x, position.y, position.z);
      world.addBody(body);

      blocks.push({ mesh, body, type });
      return true;
    }

    /**
     * 删除方块
     * @returns {boolean} 是否成功
     */
    function removeBlock(mesh) {
      const idx = blocks.findIndex(b => b.mesh === mesh);
      if (idx === -1) return false;

      const block = blocks[idx];
      scene.remove(block.mesh);
      world.removeBody(block.body);

      // 清理几何体和材质（可选，防止内存泄漏）
      // block.mesh.geometry 是共享的 blockGeometry，不单独 dispose
      // block.mesh.material 是共享的 blockMaterials，不单独 dispose

      blocks.splice(idx, 1);
      return true;
    }

    // --- Web Audio API 合成 beep 音效 ---
    let audioCtx = null;

    function getAudioContext() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AC();
      }
      // 某些浏览器需要在交互后 resume
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    }

    /**
     * 播放短促 beep
     * @param {number} freq  频率 (Hz)
     * @param {number} duration 持续时间 (秒)
     * @param {number} volume 音量 (0~1)
     */
    function playBeep(freq, duration, volume = 0.12) {
      try {
        const ctx = getAudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime);

        gain.gain.setValueAtTime(volume, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + duration);
      } catch (_) {
        // 静默忽略音频错误
      }
    }

    // --- HUD 更新 ---
    const hudSlots = document.querySelectorAll('#block-hud .slot');

    function updateHUD() {
      const typeIdx = BLOCK_TYPE_KEYS.indexOf(currentType);
      hudSlots.forEach((slot, i) => {
        slot.classList.toggle('active', i === typeIdx);
      });
    }

    // --- 事件处理 ---

    // 鼠标移动 → 更新射线
    renderer.domElement.addEventListener('pointermove', (e) => {
      updateRaycaster(e);
    });

    // 拖拽检测（防止旋转后误放置）
    let pointerDownPos = new THREE.Vector2();
    const DRAG_THRESHOLD = 3; // 像素

    renderer.domElement.addEventListener('pointerdown', (e) => {
      pointerDownPos.set(e.clientX, e.clientY);
    });

    // 左键点击 → 放置
    renderer.domElement.addEventListener('click', (e) => {
      // 如果鼠标移动超过阈值，视为拖拽（旋转/缩放），不放置
      const dx = e.clientX - pointerDownPos.x;
      const dy = e.clientY - pointerDownPos.y;
      if (Math.sqrt(dx * dx + dy * dy) > DRAG_THRESHOLD) return;

      if (!currentIntersection) return;

      const pos = getPlacementPosition(currentIntersection);
      if (placeBlock(currentType, pos)) {
        playBeep(660, 0.1, 0.1);
      }
    });

    // 右键 → 删除
    renderer.domElement.addEventListener('contextmenu', (e) => {
      e.preventDefault(); // 阻止浏览器右键菜单

      if (!currentIntersection) return;
      if (currentIntersection.mode !== 'block') return;

      if (removeBlock(currentIntersection.object)) {
        playBeep(220, 0.15, 0.1);
        // 删除后清空交集，因为对象已不存在
        currentIntersection = null;
      }
    });

    // --- 键盘切换方块类型 ---
    window.addEventListener('keydown', (e) => {
      const key = e.key;
      // 数字键 1~6 切换
      if (key >= '1' && key <= '6') {
        const idx = parseInt(key) - 1;
        currentType = BLOCK_TYPE_KEYS[idx];
        updateHUD();
      }
    });

    // 初始化 HUD
    updateHUD();

    // ============================================================
    // === EVENT HANDLERS ===
    // ============================================================
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // ============================================================
    // === EXPORT (调试用) ===
    // ============================================================
    console.log('✅ 沙盒建造游戏 Step2 初始化完成');
    console.log('   Scene children:', scene.children.length);
    console.log('   Renderer:', renderer);
    console.log('   Physics world gravity:', world.gravity);
    console.log('   Cannon-es version:', CANNON.version || 'loaded');
    console.log('   Three.js revision:', THREE.REVISION);
    console.log('   Block types:', Object.keys(BLOCK_TYPES));
    console.log('   Grid:', '40×40 @ y=0');
    console.log('   🧱 左键放置 | ❌ 右键删除 | 🔢 1-6切换材质');
  </script>
</body>
</html>

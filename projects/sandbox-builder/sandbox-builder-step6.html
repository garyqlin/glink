<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沙盒建造游戏 - Step5 · UI系统</title>
  <style>
    /* ================================================================
       === RESET & BASE
       ================================================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    /* ================================================================
       === 3D CANVAS
       ================================================================ */
    #canvas-container {
      position: fixed; inset: 0; z-index: 1;
    }

    /* ================================================================
       === PIXEL FONT SIMULATION
       ================================================================ */
    .pixel-text {
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
      image-rendering: pixelated;
    }

    /* ================================================================
       === TOP BAR
       ================================================================ */
    #top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      height: 48px;
      background: linear-gradient(180deg, rgba(20,20,20,0.92) 0%, rgba(20,20,20,0.85) 100%);
      border-bottom: 2px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
      backdrop-filter: blur(8px);
      user-select: none;
    }
    #top-bar .logo {
      font-size: 20px;
      font-weight: 900;
      color: #f0c040;
      text-shadow: 0 0 12px rgba(240,192,64,0.4), 2px 2px 0 rgba(0,0,0,0.6);
      letter-spacing: 1px;
      margin-right: auto;
      white-space: nowrap;
    }
    #top-bar .logo .cube-icon {
      display: inline-block;
      width: 22px; height: 22px;
      background: linear-gradient(135deg, #8BC34A 0%, #4CAF50 50%, #388E3C 100%);
      border: 2px solid #2E7D32;
      vertical-align: -4px;
      margin-right: 4px;
      border-radius: 2px;
    }
    #top-bar .stat {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 5px 12px;
      color: #ccc;
      font-size: 13px;
      white-space: nowrap;
    }
    #top-bar .stat .val {
      color: #f0c040;
      font-weight: 700;
      font-size: 15px;
      min-width: 20px; text-align: center;
    }
    #top-bar .btn {
      display: flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 6px 14px;
      color: #ddd;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    #top-bar .btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
      color: #fff;
    }
    #top-bar .btn:active {
      transform: scale(0.95);
      background: rgba(255,255,255,0.04);
    }
    #top-bar .btn.danger:hover {
      background: rgba(255,70,70,0.25);
      border-color: rgba(255,70,70,0.4);
      color: #ff6666;
    }
    #top-bar .btn .icon {
      font-size: 16px;
    }

    /* ================================================================
       === HOTBAR (底部工具栏)
       ================================================================ */
    #hotbar {
      position: fixed; bottom: 16px; left: 50%; z-index: 10;
      transform: translateX(-50%);
      display: flex; gap: 4px; align-items: flex-end;
      background: rgba(20,20,20,0.88);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 8px 10px;
      backdrop-filter: blur(8px);
      user-select: none;
    }
    #hotbar .slot-wrapper {
      display: flex; flex-direction: column; align-items: center;
      gap: 3px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    #hotbar .slot-wrapper:hover { transform: translateY(-3px); }
    #hotbar .slot-wrapper:active { transform: translateY(0) scale(0.93); }

    #hotbar .slot {
      width: 48px; height: 48px;
      border-radius: 6px;
      border: 3px solid rgba(255,255,255,0.15);
      background-size: cover;
      image-rendering: pixelated;
      background-color: rgba(0,0,0,0.3);
      transition: all 0.15s;
      position: relative;
    }
    #hotbar .slot-wrapper.active .slot {
      border-color: #f0c040;
      box-shadow: 0 0 16px rgba(240,192,64,0.5), inset 0 0 8px rgba(240,192,64,0.15);
      transform: translateY(-4px);
    }
    #hotbar .slot-label {
      font-size: 10px; color: #888;
      letter-spacing: 1px;
      transition: color 0.15s;
    }
    #hotbar .slot-wrapper.active .slot-label {
      color: #f0c040;
      font-weight: 700;
    }
    #hotbar .slot-key {
      position: absolute;
      top: -8px; left: -6px;
      width: 18px; height: 18px;
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: #ccc; font-size: 10px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
    }
    #hotbar .slot-wrapper.active .slot-key {
      background: #f0c040;
      color: #1a1a1a;
      border-color: #f0c040;
    }

    /* 分隔线 */
    #hotbar .divider {
      width: 1px; height: 36px;
      background: rgba(255,255,255,0.1);
      margin: 0 6px; align-self: center;
    }

    /* 模式按钮 */
    #hotbar .mode-btn {
      width: 44px; height: 44px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #aaa;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.12s;
      position: relative;
    }
    #hotbar .mode-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    #hotbar .mode-btn.active {
      border-color: #4FC3F7;
      box-shadow: 0 0 12px rgba(79,195,247,0.4);
      color: #4FC3F7;
      background: rgba(79,195,247,0.1);
    }
    #hotbar .mode-btn .mode-label {
      position: absolute; bottom: -16px;
      font-size: 9px; color: #666;
      white-space: nowrap;
    }
    #hotbar .mode-btn.active .mode-label { color: #4FC3F7; }

    /* ================================================================
       === SIDE PANEL (右侧可折叠)
       ================================================================ */
    #side-panel {
      position: fixed; right: 0; top: 60px; bottom: 80px; z-index: 9;
      width: 48px;
      transition: width 0.25s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
      display: flex; flex-direction: row;
    }
    #side-panel.open { width: 220px; }

    #side-panel .toggle-btn {
      width: 48px; min-width: 48px; height: 48px;
      background: rgba(20,20,20,0.85);
      border: 2px solid rgba(255,255,255,0.1);
      border-right: none;
      border-radius: 10px 0 0 10px;
      color: #aaa; font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      backdrop-filter: blur(8px);
    }
    #side-panel .toggle-btn:hover {
      color: #fff;
      background: rgba(30,30,30,0.9);
    }

    #side-panel .panel-content {
      flex: 1;
      background: rgba(20,20,20,0.88);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 10px 0 0 10px;
      padding: 16px;
      backdrop-filter: blur(8px);
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 14px;
    }
    #side-panel .panel-content h3 {
      color: #f0c040; font-size: 14px;
      font-weight: 700; letter-spacing: 1px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: 8px;
    }
    #side-panel .panel-content .info-row {
      display: flex; justify-content: space-between;
      color: #999; font-size: 12px;
      padding: 3px 0;
    }
    #side-panel .panel-content .info-row .val {
      color: #ddd; font-weight: 600;
    }
    #side-panel .panel-content .tip {
      color: #666; font-size: 11px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px; padding: 8px 10px;
      line-height: 1.6;
    }
    #side-panel .panel-content .tip kbd {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 10px;
      color: #ddd;
      margin: 1px;
    }

    /* ================================================================
       === TOAST 消息
       ================================================================ */
    #toast-container {
      position: fixed; top: 64px; left: 50%; z-index: 100;
      transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 6px;
      align-items: center;
      pointer-events: none;
    }
    .toast {
      background: rgba(30,30,30,0.9);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 8px 18px;
      color: #ddd;
      font-size: 13px;
      backdrop-filter: blur(6px);
      animation: toastIn 0.3s ease-out, toastOut 0.3s 1.5s ease-in forwards;
      white-space: nowrap;
    }
    .toast.success { border-color: rgba(139,195,74,0.4); color: #aed581; }
    .toast.warning { border-color: rgba(240,192,64,0.4); color: #f0c040; }
    .toast.error   { border-color: rgba(255,70,70,0.4);  color: #ff6666; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-12px); }
    }

    /* ================================================================
       === HELP OVERLAY
       ================================================================ */
    #help-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    #help-overlay.visible { opacity: 1; pointer-events: auto; }

    #help-overlay .help-card {
      background: rgba(25,25,25,0.95);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 28px 32px;
      max-width: 460px; width: 90%;
      color: #ddd;
    }
    #help-overlay .help-card h2 {
      color: #f0c040; font-size: 20px; margin-bottom: 16px;
      text-align: center;
    }
    #help-overlay .help-card .key-row {
      display: flex; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
    }
    #help-overlay .help-card .key-row .key {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px; padding: 2px 8px;
      font-size: 12px; color: #f0c040;
    }
    #help-overlay .help-card .close-hint {
      text-align: center; margin-top: 16px;
      color: #666; font-size: 11px;
    }

    /* ================================================================
       === CROSSHAIR (准星/瞄准点)
       ================================================================ */
    #crosshair {
      position: fixed; top: 50%; left: 50%; z-index: 8;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
      pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.4);
    }
    #crosshair::before {
      top: 9px; left: 0; width: 20px; height: 2px;
    }
    #crosshair::after {
      top: 0; left: 9px; width: 2px; height: 20px;
    }

    /* ================================================================
       === BLOCK NAME TOOLTIP (跟随鼠标)
       ================================================================ */
    #block-tooltip {
      position: fixed; z-index: 50;
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 4px 10px;
      color: #ddd; font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      white-space: nowrap;
    }
    #block-tooltip.visible { opacity: 1; }

    /* ================================================================
       === SCORE DISPLAY (分数面板)
       ================================================================ */
    #score-display {
      color: #f0c040;
      font-weight: 900;
      font-size: 16px;
      text-shadow: 0 0 10px rgba(240,192,64,0.5);
      min-width: 50px;
      text-align: center;
      transition: transform 0.08s;
    }
    #score-display.bounce {
      animation: scoreBounce 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes scoreBounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.35); color: #fff; }
      100% { transform: scale(1); }
    }

    #highscore-display {
      color: #ff9800;
      font-size: 12px;
      white-space: nowrap;
    }

    /* ================================================================
       === SCORE POP (分数弹出动画)
       ================================================================ */
    #score-pop-container {
      position: fixed; inset: 0; z-index: 50;
      pointer-events: none;
    }
    .score-pop {
      position: absolute;
      font-weight: 900;
      font-size: 24px;
      color: #f0c040;
      text-shadow: 0 0 10px rgba(240,192,64,0.8), 2px 2px 0 rgba(0,0,0,0.6);
      pointer-events: none;
      white-space: nowrap;
      animation: popFloat 1.2s ease-out forwards;
    }
    .score-pop.crit {
      font-size: 34px;
      color: #ff6d00;
      text-shadow: 0 0 16px rgba(255,109,0,0.9), 2px 2px 0 rgba(0,0,0,0.6);
    }
    .score-pop.combo {
      font-size: 28px;
      color: #e040fb;
      text-shadow: 0 0 12px rgba(224,64,251,0.8), 2px 2px 0 rgba(0,0,0,0.5);
    }
    @keyframes popFloat {
      0%   { opacity: 1; transform: translateY(0) scale(0.5); }
      15%  { opacity: 1; transform: translateY(-10px) scale(1.2); }
      40%  { opacity: 1; transform: translateY(-30px) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.8); }
    }

    /* ================================================================
       === ACHIEVEMENT TOAST (成就弹窗)
       ================================================================ */
    #achievement-container {
      position: fixed; top: 60px; right: 20px; z-index: 200;
      display: flex; flex-direction: column-reverse; gap: 8px;
      pointer-events: none;
    }
    .achievement-toast {
      display: flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, rgba(40,25,10,0.95) 0%, rgba(25,15,5,0.95) 100%);
      border: 2px solid #f0c040;
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 0 24px rgba(240,192,64,0.4), inset 0 0 12px rgba(240,192,64,0.08);
      animation: achievementSlide 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                 achievementFadeOut 0.5s 4s ease-in forwards;
      max-width: 280px;
    }
    .achievement-toast .ach-icon {
      font-size: 36px;
      flex-shrink: 0;
      animation: achIconPulse 0.6s ease-in-out 3;
    }
    .achievement-toast .ach-info {
      display: flex; flex-direction: column; gap: 3px;
    }
    .achievement-toast .ach-title {
      color: #f0c040; font-weight: 900; font-size: 14px;
    }
    .achievement-toast .ach-desc {
      color: #bbb; font-size: 11px;
    }
    @keyframes achievementSlide {
      from { transform: translateX(120%); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }
    @keyframes achievementFadeOut {
      to { opacity: 0; transform: translateX(30px); }
    }
    @keyframes achIconPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.25); }
    }

    /* ================================================================
       === ACHIEVEMENT BADGE GRID (侧面板成就展示)
       ================================================================ */
    .badge-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .badge {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      position: relative;
      transition: all 0.3s;
      opacity: 0.3;
      filter: grayscale(1);
    }
    .badge.unlocked {
      opacity: 1;
      filter: grayscale(0);
      border-color: rgba(240,192,64,0.5);
      box-shadow: 0 0 10px rgba(240,192,64,0.2);
    }
    .badge .badge-tooltip {
      display: none;
      position: absolute; bottom: 110%;
      background: rgba(0,0,0,0.9);
      border: 1px solid rgba(240,192,64,0.4);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 10px; color: #ddd;
      white-space: nowrap;
      z-index: 20;
    }
    .badge:hover .badge-tooltip { display: block; }

    /* ================================================================
       === COMBO INDICATOR
       ================================================================ */
    #combo-indicator {
      position: fixed; top: 50%; left: 50%; z-index: 60;
      transform: translate(-50%, 0);
      font-size: 16px; font-weight: 900;
      color: #e040fb;
      text-shadow: 0 0 12px rgba(224,64,251,0.5);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    #combo-indicator.active { opacity: 1; transform: translate(-50%, -60px); }


  </style>
</head>
<body>

  <!-- =============================================================
       === 3D CANVAS
       ============================================================= -->
  <div id="canvas-container"></div>

  <!-- =============================================================
       === TOP BAR
       ============================================================= -->
  <div id="top-bar">
    <div class="logo pixel-text">
      <span class="cube-icon"></span>沙盒建造
    </div>
    <div class="stat" style="background:rgba(240,192,64,0.1);border-color:rgba(240,192,64,0.2);">
      🏆 <span class="val" id="score-display">0</span>
      <span id="highscore-display" style="font-size:10px;color:#ff9800;">⭐ 0</span>
    </div>
    <div class="stat">
      🧱 <span class="val" id="block-count">0</span>
    </div>
    <button class="btn" id="btn-undo" title="撤销 (Ctrl+Z)">
      <span class="icon">↩</span> 撤销
    </button>
    <button class="btn danger" id="btn-clear" title="清空所有方块">
      <span class="icon">🗑</span> 清空
    </button>
  </div>

  <!-- =============================================================
       === CROSSHAIR
       ============================================================= -->
  <div id="crosshair"></div>

  <!-- =============================================================
       === TOAST CONTAINER
       ============================================================= -->
  <div id="toast-container"></div>

  <!-- =============================================================
       === BLOCK TOOLTIP
       ============================================================= -->
  <div id="block-tooltip"></div>

  <!-- =============================================================
       === HOTBAR (底部工具栏)
       ============================================================= -->
  <div id="hotbar">
    <!-- 6 slots rendered by JS -->
  </div>

  <!-- =============================================================
       === SIDE PANEL (右侧折叠面板)
       ============================================================= -->
  <div id="side-panel">
    <button class="toggle-btn" id="panel-toggle" title="信息面板">◀</button>
    <div class="panel-content">
      <h3>📊 游戏信息</h3>
      <div class="info-row">
        <span>方块总数</span>
        <span class="val" id="panel-block-count">0</span>
      </div>
      <div class="info-row">
        <span>当前选中</span>
        <span class="val" id="panel-current-type">草方块</span>
      </div>
      <div class="info-row">
        <span>模式</span>
        <span class="val" id="panel-mode">放置</span>
      </div>
      <div class="info-row">
        <span>FPS</span>
        <span class="val" id="panel-fps">0</span>
      </div>
      <h3>💡 提示</h3>
      <div class="tip">
        <kbd>H</kbd> 查看快捷键<br>
        <kbd>🖱滚轮</kbd> 切换方块<br>
        <kbd>🖱左键</kbd> 放置方块<br>
        <kbd>🖱右键</kbd> 删除方块<br>
        <kbd>Ctrl+Z</kbd> 撤销
      </div>
    </div>
  </div>

  <!-- =============================================================
       === HELP OVERLAY
       ============================================================= -->
  <div id="help-overlay">
    <div class="help-card">
      <h2>⌨️ 操作快捷键</h2>
      <div class="key-row"><span>放置方块</span><span class="key">鼠标左键</span></div>
      <div class="key-row"><span>删除方块</span><span class="key">鼠标右键</span></div>
      <div class="key-row"><span>切换方块</span><span class="key">1-6 / 滚轮</span></div>
      <div class="key-row"><span>撤销放置</span><span class="key">Ctrl + Z</span></div>
      <div class="key-row"><span>清空全部</span><span class="key">Ctrl + Shift + C</span></div>
      <div class="key-row"><span>旋转视角</span><span class="key">鼠标拖拽</span></div>
      <div class="key-row"><span>缩放</span><span class="key">滚轮 / 双指</span></div>
      <div class="key-row"><span>切换模式</span><span class="key">Tab</span></div>
      <div class="key-row"><span>帮助面板</span><span class="key">H / ?</span></div>
      <div class="close-hint">按 <kbd>Esc</kbd> 或 <kbd>H</kbd> 关闭</div>
    </div>
  </div>

  <!-- =============================================================
       === DEPENDENCIES
       ============================================================= -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script src="https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"></script>

  <!-- =============================================================
       === MAIN GAME SCRIPT (ESM)
       ============================================================= -->
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ============================================================
    // === CONSTANTS
    // ============================================================
    const GRID_SIZE = 1;
    const MAX_HEIGHT = 20;
    const CANNON = window.CANNON;

    const BLOCK_TYPES = {
      grass: { name: '草方块', key: '1' },
      dirt:  { name: '泥土',   key: '2' },
      wood:  { name: '木材',   key: '3' },
      stone: { name: '石头',   key: '4' },
      brick: { name: '砖块',   key: '5' },
      glass: { name: '玻璃',   key: '6' },
    };
    const BLOCK_TYPE_KEYS = Object.keys(BLOCK_TYPES);

    // ============================================================
    // === GAME STATE (计分/成就系统)
    // ============================================================
    const gameState = {
      score: 0,
      highScore: parseInt(localStorage.getItem('sandbox-highscore') || '0'),
      combo: 0,
      comboTimer: null,
      comboTimeout: null,
      placedCount: 0,
      removedCount: 0,
      placedHighCount: 0,   // 在 y>=15 高度放置的方块数
      typesUsed: new Set(),
      rapidPlaced: [],       // 时间戳数组，用于检测闪电手
      unlocked: JSON.parse(localStorage.getItem('sandbox-achievements') || '[]'),
    };

    // ============================================================
    // === ACHIEVEMENT DEFINITIONS (6种成就徽章)
    // ============================================================
    const ACHIEVEMENTS = [
      {
        id: 'builder',
        icon: '🧱',
        name: '建筑师',
        desc: '累计放置 100 个方块',
        check: () => gameState.placedCount >= 100,
      },
      {
        id: 'destroyer',
        icon: '💥',
        name: '拆迁队',
        desc: '累计拆除 50 个方块',
        check: () => gameState.removedCount >= 50,
      },
      {
        id: 'climber',
        icon: '🏔️',
        name: '登高者',
        desc: '在高度 15+ 放置 10 个方块',
        check: () => gameState.placedHighCount >= 10,
      },
      {
        id: 'collector',
        icon: '🌈',
        name: '收藏家',
        desc: '使用过全部 6 种方块',
        check: () => gameState.typesUsed.size >= 6,
      },
      {
        id: 'speedster',
        icon: '⚡',
        name: '闪电手',
        desc: '30 秒内放置 20 个方块',
        check: () => {
          const now = Date.now();
          gameState.rapidPlaced = gameState.rapidPlaced.filter(t => now - t < 30000);
          return gameState.rapidPlaced.length >= 20;
        },
      },
      {
        id: 'master',
        icon: '👑',
        name: '全能王',
        desc: '解锁全部其他成就',
        check: () => {
          const otherIds = ACHIEVEMENTS.filter(a => a.id !== 'master').map(a => a.id);
          return otherIds.every(id => gameState.unlocked.includes(id));
        },
      },
    ];

    // ============================================================
    // === SCORE FUNCTIONS
    // ============================================================
    function addScore(points, worldPos, bonusType) {
      gameState.score += points;
      
      // Combo system
      gameState.combo++;
      if (gameState.comboTimeout) clearTimeout(gameState.comboTimeout);
      gameState.comboTimeout = setTimeout(() => {
        gameState.combo = 0;
        updateComboIndicator();
      }, 2500);

      // Combo bonus (every 5 combo)
      if (gameState.combo > 0 && gameState.combo % 5 === 0) {
        const comboBonus = gameState.combo * 2;
        gameState.score += comboBonus;
        spawnScorePop(comboBonus, worldPos, 'combo');
        showToast(`🔥 ${gameState.combo}连击! +${comboBonus}`, 'warning');
      } else {
        spawnScorePop(points, worldPos, bonusType || '');
      }

      // Update high score
      if (gameState.score > gameState.highScore) {
        gameState.highScore = gameState.score;
        localStorage.setItem('sandbox-highscore', gameState.highScore);
      }

      updateScoreDisplay();
      updateComboIndicator();
      checkAchievements();
    }

    function spawnScorePop(points, worldPos, cssClass) {
      if (!worldPos) return;
      
      // Project 3D world position to 2D screen position
      const vector = worldPos.clone().project(camera);
      const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;

      const pop = document.createElement('div');
      pop.className = 'score-pop' + (cssClass ? ' ' + cssClass : '');
      pop.textContent = '+' + points;
      pop.style.left = x + 'px';
      pop.style.top = y + 'px';
      
      document.getElementById('score-pop-container').appendChild(pop);
      
      // Auto remove after animation
      setTimeout(() => pop.remove(), 1300);
    }

    function updateScoreDisplay() {
      const el = document.getElementById('score-display');
      el.textContent = gameState.score;
      el.classList.remove('bounce');
      void el.offsetWidth; // reflow
      el.classList.add('bounce');

      const hsEl = document.getElementById('highscore-display');
      hsEl.textContent = '⭐ ' + gameState.highScore;
    }

    function updateComboIndicator() {
      const el = document.getElementById('combo-indicator');
      if (gameState.combo >= 3) {
        el.textContent = '🔥 ' + gameState.combo + ' 连击!';
        el.classList.add('active');
      } else {
        el.classList.remove('active');
      }
    }

    // ============================================================
    // === ACHIEVEMENT FUNCTIONS
    // ============================================================
    function checkAchievements() {
      for (const ach of ACHIEVEMENTS) {
        if (gameState.unlocked.includes(ach.id)) continue;
        if (ach.check()) {
          unlockAchievement(ach);
        }
      }
    }

    function unlockAchievement(ach) {
      gameState.unlocked.push(ach.id);
      localStorage.setItem('sandbox-achievements', JSON.stringify(gameState.unlocked));

      // Show achievement toast
      const toast = document.createElement('div');
      toast.className = 'achievement-toast';
      toast.innerHTML = `
        <span class="ach-icon">${ach.icon}</span>
        <div class="ach-info">
          <span class="ach-title">🏅 成就解锁!</span>
          <span class="ach-desc">${ach.icon} ${ach.name} — ${ach.desc}</span>
        </div>
      `;
      document.getElementById('achievement-container').appendChild(toast);
      setTimeout(() => toast.remove(), 5000);

      // Update badge display
      updateBadgeDisplay();
      
      showToast(`🏅 成就解锁: ${ach.name}!`, 'success');
    }

    function updateBadgeDisplay() {
      const badges = document.querySelectorAll('.badge');
      badges.forEach(badge => {
        const achId = badge.dataset.achId;
        if (gameState.unlocked.includes(achId)) {
          badge.classList.add('unlocked');
        }
      });
    }

    function buildBadgeGrid() {
      const panel = document.querySelector('#side-panel .panel-content');
      const h3 = document.createElement('h3');
      h3.textContent = '🏅 成就徽章';
      panel.appendChild(h3);

      const grid = document.createElement('div');
      grid.className = 'badge-grid';
      for (const ach of ACHIEVEMENTS) {
        const badge = document.createElement('div');
        badge.className = 'badge' + (gameState.unlocked.includes(ach.id) ? ' unlocked' : '');
        badge.dataset.achId = ach.id;
        badge.textContent = ach.icon;
        badge.title = ach.name;
        const tooltip = document.createElement('span');
        tooltip.className = 'badge-tooltip';
        tooltip.textContent = ach.name + ': ' + ach.desc;
        badge.appendChild(tooltip);
        grid.appendChild(badge);
      }
      panel.appendChild(grid);
    }

    // ============================================================
    // === RESET SCORE (清空时调用)
    // ============================================================
    function resetScore() {
      gameState.score = 0;
      gameState.combo = 0;
      updateScoreDisplay();
      updateComboIndicator();
    }



    // ============================================================
    // === DOM REFS
    // ============================================================
    const container = document.getElementById('canvas-container');
    const blockCountEl = document.getElementById('block-count');
    const toastContainer = document.getElementById('toast-container');
    const helpOverlay = document.getElementById('help-overlay');
    const sidePanel = document.getElementById('side-panel');
    const panelToggle = document.getElementById('panel-toggle');
    const panelBlockCount = document.getElementById('panel-block-count');
    const panelCurrentType = document.getElementById('panel-current-type');
    const panelMode = document.getElementById('panel-mode');
    const panelFps = document.getElementById('panel-fps');
    const blockTooltip = document.getElementById('block-tooltip');
    const hotbarEl = document.getElementById('hotbar');

    // ============================================================
    // === SCENE
    // ============================================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 30, 150);

    // ============================================================
    // === CAMERA
    // ============================================================
    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(10, 8, 10);
    camera.lookAt(0, 0, 0);

    // ============================================================
    // === RENDERER
    // ============================================================
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // ============================================================
    // === ORBIT CONTROLS
    // ============================================================
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.enablePan = false;
    controls.enableRotate = true;
    controls.enableZoom = true;
    controls.minPolarAngle = THREE.MathUtils.degToRad(5);
    controls.maxPolarAngle = THREE.MathUtils.degToRad(85);
    controls.target.set(0, 0, 0);
    controls.update();

    // ============================================================
    // === LIGHTING
    // ============================================================
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffee, 0.8);
    directionalLight.position.set(50, 100, 50);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.width = 2048;
    directionalLight.shadow.mapSize.height = 2048;
    directionalLight.shadow.camera.near = 0.5;
    directionalLight.shadow.camera.far = 200;
    directionalLight.shadow.camera.left = -60;
    directionalLight.shadow.camera.right = 60;
    directionalLight.shadow.camera.top = 60;
    directionalLight.shadow.camera.bottom = -60;
    directionalLight.shadow.bias = -0.0005;
    directionalLight.shadow.normalBias = 0.02;
    scene.add(directionalLight);

    // ============================================================
    // === GROUND
    // ============================================================
    function createGroundTexture(size = 512) {
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#4a8c3f';
      ctx.fillRect(0, 0, size, size);
      for (let i = 0; i < 8000; i++) {
        const x = Math.random() * size, y = Math.random() * size;
        const shade = 100 + Math.floor(Math.random() * 80);
        ctx.fillStyle = `rgb(${30+Math.floor(Math.random()*40)},${shade},${20+Math.floor(Math.random()*30)})`;
        ctx.fillRect(x, y, 2 + Math.random() * 3, 2 + Math.random() * 3);
      }
      for (let i = 0; i < 400; i++) {
        const shade = 30 + Math.floor(Math.random() * 30);
        ctx.fillStyle = `rgba(${shade},${shade+15},${shade},0.4)`;
        ctx.beginPath();
        ctx.arc(Math.random()*size, Math.random()*size, 2+Math.random()*6, 0, Math.PI*2);
        ctx.fill();
      }
      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(40, 40);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }
    const groundTexture = createGroundTexture();
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(100, 100),
      new THREE.MeshStandardMaterial({ map: groundTexture, roughness: 0.9, metalness: 0.0, color: new THREE.Color(0xffffff) })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.01;
    ground.receiveShadow = true;
    scene.add(ground);

    // ============================================================
    // === GRID HELPER
    // ============================================================
    const gridHelper = new THREE.GridHelper(40, 40, 0x666666, 0x999999);
    gridHelper.position.y = 0.001;
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.35;
    scene.add(gridHelper);

    // ============================================================
    // === PHYSICS WORLD (Cannon-es)
    // ============================================================
    const world = new CANNON.World();
    world.gravity.set(0, -9.82, 0);
    world.broadphase = new CANNON.NaiveBroadphase();
    world.solver.iterations = 10;
    world.defaultContactMaterial.restitution = 0.3;

    const groundBody = new CANNON.Body({ type: CANNON.Body.STATIC, shape: new CANNON.Plane() });
    groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
    world.addBody(groundBody);

    const physicsBodies = [];
    const blockHalfExtents = new CANNON.Vec3(0.5, 0.5, 0.5);
    const blockShape = new CANNON.Box(blockHalfExtents);

    function createPhysicsBodyForBlock(mesh, spawnPos, mass = 1) {
      const body = new CANNON.Body({ mass, shape: blockShape });
      body.position.set(spawnPos.x, spawnPos.y, spawnPos.z);
      body.velocity.set(0, 2.0 + Math.random() * 3.0, 0);
      body.velocity.x = (Math.random() - 0.5) * 0.5;
      body.velocity.z = (Math.random() - 0.5) * 0.5;
      body.linearDamping = 0.5;
      body.angularDamping = 0.5;
      world.addBody(body);
      physicsBodies.push({ mesh, body });
      return body;
    }

    function removePhysicsBodyForBlock(mesh) {
      const idx = physicsBodies.findIndex(e => e.mesh === mesh);
      if (idx === -1) return false;
      world.removeBody(physicsBodies[idx].body);
      physicsBodies.splice(idx, 1);
      return true;
    }

    // ============================================================
    // === TEXTURE GENERATION
    // ============================================================
    const textureCache = {};
    const TEX_SIZE = 64;

    function generateMaterialTexture(type) {
      if (textureCache[type]) return textureCache[type];
      const canvas = document.createElement('canvas');
      canvas.width = TEX_SIZE; canvas.height = TEX_SIZE;
      const ctx = canvas.getContext('2d');

      switch (type) {
        case 'grass':
          ctx.fillStyle = '#4CAF50'; ctx.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
          for (let i = 0; i < 600; i++) {
            const x = Math.random() * TEX_SIZE, y = Math.random() * TEX_SIZE;
            ctx.fillStyle = `rgb(${30+Math.floor(Math.random()*40)},${120+Math.floor(Math.random()*80)},${20+Math.floor(Math.random()*40)})`;
            ctx.fillRect(x, y, 2 + Math.random() * 4, 2 + Math.random() * 4);
          }
          ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 2;
          ctx.strokeRect(4, 4, TEX_SIZE - 8, TEX_SIZE - 8);
          break;
        case 'dirt':
          ctx.fillStyle = '#795548'; ctx.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
          for (let i = 0; i < 800; i++) {
            ctx.fillStyle = `rgb(${80+Math.floor(Math.random()*60)},${50+Math.floor(Math.random()*50)},${20+Math.floor(Math.random()*30)})`;
            ctx.fillRect(Math.random()*TEX_SIZE, Math.random()*TEX_SIZE, 2+Math.random()*3, 2+Math.random()*3);
          }
          break;
        case 'wood':
          ctx.fillStyle = '#BCAAA4'; ctx.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
          for (let y = 0; y < TEX_SIZE; y += 4 + Math.floor(Math.random() * 3)) {
            ctx.fillStyle = `rgba(120,${80+Math.floor(Math.random()*30)},${50+Math.floor(Math.random()*30)},0.5)`;
            ctx.fillRect(0, y, TEX_SIZE, 2 + Math.random() * 2);
          }
          ctx.fillStyle = 'rgba(60,30,10,0.25)';
          ctx.beginPath(); ctx.arc(TEX_SIZE/2, TEX_SIZE/2, 14, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(TEX_SIZE/2, TEX_SIZE/2, 8, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(40,20,10,0.3)'; ctx.fill();
          break;
        case 'stone':
          ctx.fillStyle = '#9E9E9E'; ctx.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
          for (let i = 0; i < 500; i++) {
            ctx.fillStyle = `rgb(${120+Math.floor(Math.random()*40)},${120+Math.floor(Math.random()*40)},${120+Math.floor(Math.random()*40)})`;
            ctx.fillRect(Math.random()*TEX_SIZE, Math.random()*TEX_SIZE, 3+Math.random()*4, 3+Math.random()*4);
          }
          ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(20, 10); ctx.lineTo(25, TEX_SIZE-10); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(TEX_SIZE-15, 12); ctx.lineTo(TEX_SIZE-20, TEX_SIZE-8); ctx.stroke();
          break;
        case 'brick':
          ctx.fillStyle = '#C62828'; ctx.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
          for (let row = 0; row < 4; row++) {
            const offset = (row % 2) * (TEX_SIZE / 4);
            for (let col = 0; col < 5; col++) {
              ctx.fillStyle = `rgb(${170+Math.floor(Math.random()*40)},${30+Math.floor(Math.random()*20)},${20+Math.floor(Math.random()*20)})`;
              ctx.fillRect(col * (TEX_SIZE/2) + offset - TEX_SIZE/4, row * (TEX_SIZE/4), TEX_SIZE/2 - 2, TEX_SIZE/4 - 2);
            }
          }
          ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
          for (let row = 0; row < 4; row++) {
            const offset = (row % 2) * (TEX_SIZE / 4);
            for (let col = 0; col < 5; col++) {
              const bx = col * (TEX_SIZE/2) + offset - TEX_SIZE/4;
              const by = row * (TEX_SIZE/4);
              ctx.strokeRect(bx, by, TEX_SIZE/2 - 2, TEX_SIZE/4 - 2);
            }
          }
          break;
        case 'glass':
          ctx.fillStyle = '#81D4FA'; ctx.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
          ctx.fillStyle = 'rgba(200,230,255,0.3)';
          ctx.fillRect(5, 5, TEX_SIZE-10, TEX_SIZE-10);
          ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 2;
          for (let i = 0; i < 6; i++) {
            const offset = -28 + i * 16;
            ctx.beginPath();
            ctx.moveTo(offset, 0); ctx.lineTo(offset + TEX_SIZE, TEX_SIZE);
            ctx.stroke();
          }
          ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2;
          ctx.strokeRect(5, 5, TEX_SIZE-10, TEX_SIZE-10);
          break;
        default:
          ctx.fillStyle = '#888888'; ctx.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.magFilter = THREE.NearestFilter;
      texture.minFilter = THREE.NearestFilter;
      texture.wrapS = THREE.ClampToEdgeWrapping;
      texture.wrapT = THREE.ClampToEdgeWrapping;
      texture.colorSpace = THREE.SRGBColorSpace;
      textureCache[type] = texture;
      return texture;
    }

    const grassTopTex = generateMaterialTexture('grass');
    const dirtTex     = generateMaterialTexture('dirt');
    const woodTex     = generateMaterialTexture('wood');
    const stoneTex    = generateMaterialTexture('stone');
    const brickTex    = generateMaterialTexture('brick');
    const glassTex    = generateMaterialTexture('glass');

    const grassSideMat = new THREE.MeshStandardMaterial({ map: dirtTex, roughness: 0.9, metalness: 0.0 });
    const grassTopMat  = new THREE.MeshStandardMaterial({ map: grassTopTex, roughness: 0.9, metalness: 0.0 });
    const grassMaterials = [grassSideMat, grassSideMat, grassTopMat, grassSideMat, grassSideMat, grassSideMat];

    const blockMaterials = {
      grass: grassMaterials,
      dirt:  new THREE.MeshStandardMaterial({ map: dirtTex,  roughness: 0.95, metalness: 0.0 }),
      wood:  new THREE.MeshStandardMaterial({ map: woodTex,  roughness: 0.8,  metalness: 0.0 }),
      stone: new THREE.MeshStandardMaterial({ map: stoneTex, roughness: 0.95, metalness: 0.0 }),
      brick: new THREE.MeshStandardMaterial({ map: brickTex, roughness: 0.9,  metalness: 0.0 }),
      glass: new THREE.MeshStandardMaterial({ map: glassTex, roughness: 0.2, metalness: 0.2, transparent: true, opacity: 0.5 }),
    };

    // ============================================================
    // === BLOCK PLACEMENT PREVIEW (半透明预览)
    // ============================================================
    const previewGeometry = new THREE.BoxGeometry(GRID_SIZE, GRID_SIZE, GRID_SIZE);
    const previewMaterial = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.35,
      depthTest: true,
      depthWrite: false,
    });
    const previewMesh = new THREE.Mesh(previewGeometry, previewMaterial);
    previewMesh.visible = false;
    previewMesh.renderOrder = 999;
    previewMesh.material.depthTest = true;
    scene.add(previewMesh);

    // ============================================================
    // === GAME STATE
    // ============================================================
    const blockGeometry = new THREE.BoxGeometry(GRID_SIZE, GRID_SIZE, GRID_SIZE);
    const blocks = [];
    let currentType = 'grass';
    let currentMode = 'place'; // 'place' | 'remove'
    const undoStack = []; // [{mesh, type}] 用于撤销

    // ============================================================
    // === RAYCASTER
    // ============================================================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    let currentIntersection = null;

    function updateRaycaster(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const blockMeshes = blocks.map(b => b.mesh);
      const blockHits = raycaster.intersectObjects(blockMeshes, false);

      if (blockHits.length > 0) {
        const hit = blockHits[0];
        currentIntersection = {
          point: hit.point.clone(),
          normal: hit.face.normal.clone(),
          object: hit.object,
          mode: 'block',
        };
        // Show tooltip with block type name
        const blockData = blocks.find(b => b.mesh === hit.object);
        if (blockData) {
          showBlockTooltip(event, BLOCK_TYPES[blockData.type]?.name || '方块');
        }
        updatePreviewPosition();
        return;
      }

      hideBlockTooltip();

      const groundTarget = new THREE.Vector3();
      const hitGround = raycaster.ray.intersectPlane(groundPlane, groundTarget);
      if (hitGround) {
        currentIntersection = {
          point: groundTarget.clone(),
          normal: new THREE.Vector3(0, 1, 0),
          object: null,
          mode: 'ground',
        };
      } else {
        currentIntersection = null;
      }
      updatePreviewPosition();
    }

    function getPlacementPosition(intersection) {
      const pos = new THREE.Vector3();
      if (intersection.mode === 'ground') {
        pos.x = Math.round(intersection.point.x);
        pos.y = 0.5;
        pos.z = Math.round(intersection.point.z);
      } else if (intersection.mode === 'block') {
        pos.copy(intersection.point).add(intersection.normal.clone().multiplyScalar(GRID_SIZE));
        pos.x = Math.round(pos.x);
        pos.y = Math.round(pos.y);
        pos.z = Math.round(pos.z);
      }
      return pos;
    }

    function isPositionOccupied(position) {
      for (const b of blocks) {
        if (b.mesh.position.distanceTo(position) < 0.1) return true;
      }
      return false;
    }

    function updatePreviewPosition() {
      if (!currentIntersection || currentMode !== 'place') {
        previewMesh.visible = false;
        return;
      }
      const pos = getPlacementPosition(currentIntersection);
      if (pos.y >= MAX_HEIGHT || pos.y < 0.5 || isPositionOccupied(pos)) {
        previewMesh.visible = false;
        return;
      }
      previewMesh.position.copy(pos);
      previewMesh.visible = true;
    }

    function placeBlock(type, position) {
      if (position.y >= MAX_HEIGHT) return false;
      if (position.y < 0.5) return false;
      if (isPositionOccupied(position)) return false;

      const mesh = new THREE.Mesh(blockGeometry, blockMaterials[type]);
      mesh.position.copy(position);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      createPhysicsBodyForBlock(mesh, position, 1);
      blocks.push({ mesh, type });
      undoStack.push({ mesh, type });

      // Scoring
      let points = 10; // base
      if (position.y >= 15) { points += 10; gameState.placedHighCount++; }
      else if (position.y >= 8) { points += 5; }
      gameState.placedCount++;
      gameState.typesUsed.add(type);
      gameState.rapidPlaced.push(Date.now());
      addScore(points, position.clone());

      updateBlockCount();
      updatePreviewPosition();
      return true;
    }

    function removeBlock(mesh) {
      const idx = blocks.findIndex(b => b.mesh === mesh);
      if (idx === -1) return false;
      const block = blocks[idx];
      scene.remove(block.mesh);
      removePhysicsBodyForBlock(block.mesh);
      // Remove from undo stack if present
      const undoIdx = undoStack.findIndex(u => u.mesh === mesh);
      if (undoIdx !== -1) undoStack.splice(undoIdx, 1);
      blocks.splice(idx, 1);

      // Scoring
      gameState.removedCount++;
      addScore(5, block.mesh.position.clone());

      updateBlockCount();
      return true;
    }

    function undoLastBlock() {
      if (undoStack.length === 0) return false;
      const last = undoStack.pop();
      // only undo if the block still exists
      const idx = blocks.findIndex(b => b.mesh === last.mesh);
      if (idx === -1) return false;
      scene.remove(last.mesh);
      removePhysicsBodyForBlock(last.mesh);
      blocks.splice(idx, 1);

      // Undo scoring: deduct the points earned
      gameState.score = Math.max(0, gameState.score - 10);
      gameState.placedCount = Math.max(0, gameState.placedCount - 1);
      updateScoreDisplay();
      
      updateBlockCount();
      return true;
    }

    function clearAllBlocks() {
      if (blocks.length === 0) return;
      while (blocks.length > 0) {
        const b = blocks.pop();
        scene.remove(b.mesh);
        removePhysicsBodyForBlock(b.mesh);
      }
      undoStack.length = 0;
      currentIntersection = null;
      previewMesh.visible = false;
      resetScore();
      updateBlockCount();
    }

    function updateBlockCount() {
      const count = blocks.length;
      blockCountEl.textContent = count;
      panelBlockCount.textContent = count;
    }

    function updatePanelCurrentType() {
      panelCurrentType.textContent = BLOCK_TYPES[currentType].name;
      panelMode.textContent = currentMode === 'place' ? '🔨 放置' : '💥 删除';
    }

    // ============================================================
    // === AUDIO
    // ============================================================
    let audioCtx = null;
    function getAudioContext() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AC();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function playBeep(freq, duration, volume = 0.12) {
      try {
        const ctx = getAudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(volume, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + duration);
      } catch (_) {}
    }
    function playPlaceSound() { playBeep(500 + Math.random() * 300, 0.12, 0.1); }
    function playRemoveSound() { playBeep(220, 0.15, 0.1); }
    function playSwitchSound() { playBeep(800, 0.06, 0.05); }
    function playErrorSound() { playBeep(150, 0.2, 0.08); }

    // ============================================================
    // === TOAST SYSTEM
    // ============================================================
    function showToast(message, type = '') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    // ============================================================
    // === BLOCK TOOLTIP
    // ============================================================
    function showBlockTooltip(event, text) {
      blockTooltip.textContent = text;
      blockTooltip.style.left = (event.clientX + 15) + 'px';
      blockTooltip.style.top = (event.clientY - 30) + 'px';
      blockTooltip.classList.add('visible');
    }
    function hideBlockTooltip() {
      blockTooltip.classList.remove('visible');
    }

    // ============================================================
    // === HOTBAR RENDERING
    // ============================================================
    function buildHotbar() {
      hotbarEl.innerHTML = '';

      BLOCK_TYPE_KEYS.forEach((type, i) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'slot-wrapper' + (type === currentType ? ' active' : '');
        wrapper.title = `${BLOCK_TYPES[type].name} (${i + 1})`;
        wrapper.dataset.type = type;

        const slot = document.createElement('div');
        slot.className = 'slot';

        // Key badge
        const keyBadge = document.createElement('span');
        keyBadge.className = 'slot-key';
        keyBadge.textContent = i + 1;
        slot.appendChild(keyBadge);

        // Thumbnail from texture cache
        const tex = textureCache[type];
        if (tex && tex.source && tex.source.data) {
          const thumb = document.createElement('canvas');
          thumb.width = 48; thumb.height = 48;
          const tctx = thumb.getContext('2d');
          tctx.imageSmoothingEnabled = false;
          tctx.drawImage(tex.source.data, 0, 0, 48, 48);
          slot.style.backgroundImage = `url(${thumb.toDataURL()})`;
        }

        wrapper.appendChild(slot);

        // Label
        const label = document.createElement('span');
        label.className = 'slot-label';
        label.textContent = type === 'grass' ? '草' : type === 'dirt' ? '土' : type === 'wood' ? '木' : type === 'stone' ? '石' : type === 'brick' ? '砖' : '玻';
        wrapper.appendChild(label);

        wrapper.addEventListener('click', () => {
          currentType = type;
          updateHotbarActive();
          updatePanelCurrentType();
          updatePreviewPosition();
          playSwitchSound();
        });

        hotbarEl.appendChild(wrapper);
      });

      // Divider
      const divider = document.createElement('div');
      divider.className = 'divider';
      hotbarEl.appendChild(divider);

      // Place mode button
      const placeBtn = document.createElement('button');
      placeBtn.className = 'mode-btn' + (currentMode === 'place' ? ' active' : '');
      placeBtn.innerHTML = '🔨<span class="mode-label">放置</span>';
      placeBtn.title = '放置模式 (Tab)';
      placeBtn.addEventListener('click', () => {
        currentMode = 'place';
        updateHotbarMode();
        updatePanelCurrentType();
        updatePreviewPosition();
      });
      hotbarEl.appendChild(placeBtn);
      placeBtn.dataset.mode = 'place';

      // Remove mode button
      const removeBtn = document.createElement('button');
      removeBtn.className = 'mode-btn' + (currentMode === 'remove' ? ' active' : '');
      removeBtn.innerHTML = '💥<span class="mode-label">删除</span>';
      removeBtn.title = '删除模式 (Tab)';
      removeBtn.addEventListener('click', () => {
        currentMode = 'remove';
        updateHotbarMode();
        updatePanelCurrentType();
        previewMesh.visible = false;
      });
      hotbarEl.appendChild(removeBtn);
      removeBtn.dataset.mode = 'remove';
    }

    function updateHotbarActive() {
      const wrappers = hotbarEl.querySelectorAll('.slot-wrapper');
      wrappers.forEach(w => {
        w.classList.toggle('active', w.dataset.type === currentType);
      });
    }

    function updateHotbarMode() {
      const modeBtns = hotbarEl.querySelectorAll('.mode-btn');
      modeBtns.forEach(b => {
        b.classList.toggle('active', b.dataset.mode === currentMode);
      });
    }

    // ============================================================
    // === SIDE PANEL TOGGLE
    // ============================================================
    let panelOpen = false;
    panelToggle.addEventListener('click', () => {
      panelOpen = !panelOpen;
      sidePanel.classList.toggle('open', panelOpen);
      panelToggle.textContent = panelOpen ? '▶' : '◀';
    });

    // ============================================================
    // === HELP OVERLAY
    // ============================================================
    function toggleHelp() {
      const visible = helpOverlay.classList.contains('visible');
      helpOverlay.classList.toggle('visible', !visible);
    }
    helpOverlay.addEventListener('click', (e) => {
      if (e.target === helpOverlay) helpOverlay.classList.remove('visible');
    });

    // ============================================================
    // === TOP BAR BUTTONS
    // ============================================================
    document.getElementById('btn-undo').addEventListener('click', () => {
      if (undoLastBlock()) {
        playRemoveSound();
        showToast('已撤销', 'warning');
      } else {
        playErrorSound();
        showToast('没有可撤销的操作', 'error');
      }
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      if (blocks.length === 0) {
        playErrorSound();
        showToast('场景已为空', 'error');
        return;
      }
      clearAllBlocks();
      playRemoveSound();
      showToast('已清空所有方块', 'warning');
    });

    // ============================================================
    // === GAME INPUT EVENTS
    // ============================================================
    renderer.domElement.addEventListener('pointermove', (e) => {
      updateRaycaster(e);
    });

    let pointerDownPos = new THREE.Vector2();
    const DRAG_THRESHOLD = 3;

    renderer.domElement.addEventListener('pointerdown', (e) => {
      pointerDownPos.set(e.clientX, e.clientY);
    });

    renderer.domElement.addEventListener('click', (e) => {
      const dx = e.clientX - pointerDownPos.x;
      const dy = e.clientY - pointerDownPos.y;
      if (Math.sqrt(dx * dx + dy * dy) > DRAG_THRESHOLD) return;
      if (!currentIntersection) return;

      if (currentMode === 'place') {
        const pos = getPlacementPosition(currentIntersection);
        if (placeBlock(currentType, pos)) {
          playPlaceSound();
          showToast(`放置 ${BLOCK_TYPES[currentType].name}`, 'success');
        }
      } else if (currentMode === 'remove') {
        if (currentIntersection.mode !== 'block') return;
        if (removeBlock(currentIntersection.object)) {
          playRemoveSound();
          currentIntersection = null;
          previewMesh.visible = false;
          showToast('删除方块', 'warning');
        }
      }
    });

    renderer.domElement.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      if (!currentIntersection) return;
      if (currentIntersection.mode !== 'block') return;

      if (removeBlock(currentIntersection.object)) {
        playRemoveSound();
        currentIntersection = null;
        previewMesh.visible = false;
        showToast('删除方块', 'warning');
      }
    });

    // Mouse wheel to switch block type
    renderer.domElement.addEventListener('wheel', (e) => {
      // Only switch blocks if not zooming (Ctrl/Meta not pressed)
      if (e.ctrlKey || e.metaKey) return;

      const currentIdx = BLOCK_TYPE_KEYS.indexOf(currentType);
      let newIdx;
      if (e.deltaY > 0) {
        newIdx = (currentIdx + 1) % BLOCK_TYPE_KEYS.length;
      } else {
        newIdx = (currentIdx - 1 + BLOCK_TYPE_KEYS.length) % BLOCK_TYPE_KEYS.length;
      }
      currentType = BLOCK_TYPE_KEYS[newIdx];
      updateHotbarActive();
      updatePanelCurrentType();
      updatePreviewPosition();
      playSwitchSound();
    }, { passive: true });

    window.addEventListener('keydown', (e) => {
      // Block type switching
      if (e.key >= '1' && e.key <= '6') {
        const idx = parseInt(e.key) - 1;
        currentType = BLOCK_TYPE_KEYS[idx];
        updateHotbarActive();
        updatePanelCurrentType();
        updatePreviewPosition();
        playSwitchSound();
        return;
      }

      // Help toggle
      if (e.key === 'h' || e.key === 'H' || e.key === '?') {
        if (!e.ctrlKey && !e.metaKey) {
          e.preventDefault();
          toggleHelp();
          return;
        }
      }

      // Close help
      if (e.key === 'Escape') {
        helpOverlay.classList.remove('visible');
        return;
      }

      // Tab - toggle mode
      if (e.key === 'Tab') {
        e.preventDefault();
        currentMode = currentMode === 'place' ? 'remove' : 'place';
        updateHotbarMode();
        updatePanelCurrentType();
        updatePreviewPosition();
        showToast(`切换到 ${currentMode === 'place' ? '放置' : '删除'} 模式`, '');
        return;
      }

      // Ctrl+Z - Undo
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        if (undoLastBlock()) {
          playRemoveSound();
          showToast('已撤销', 'warning');
        } else {
          playErrorSound();
          showToast('没有可撤销的操作', 'error');
        }
        return;
      }

      // Ctrl+Shift+C - Clear all
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'c' || e.key === 'C')) {
        e.preventDefault();
        if (blocks.length === 0) {
          playErrorSound();
          showToast('场景已为空', 'error');
        } else {
          clearAllBlocks();
          playRemoveSound();
          showToast('已清空所有方块', 'warning');
        }
        return;
      }
    });

    // ============================================================
    // === RENDER / PHYSICS LOOP
    // ============================================================
    const clock = new THREE.Clock();
    let fpsCounter = 0;
    let fpsTime = 0;
    let currentFPS = 0;

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.1);

      // Combo decay timer
      if (gameState.comboTimeout === null && gameState.combo > 0) {
        gameState.combo = 0;
        updateComboIndicator();
      }

      // Physics step
      world.step(1 / 60, delta, 2);

      // Sync physics → Three.js
      for (const { mesh, body } of physicsBodies) {
        mesh.position.copy(body.position);
        mesh.quaternion.copy(body.quaternion);
      }

      // FPS counter
      fpsCounter++;
      fpsTime += delta;
      if (fpsTime >= 0.5) {
        currentFPS = Math.round(fpsCounter / fpsTime);
        panelFps.textContent = currentFPS;
        fpsCounter = 0;
        fpsTime = 0;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // ============================================================
    // === INIT UI
    // ============================================================
    buildHotbar();
    buildBadgeGrid();
    updatePanelCurrentType();
    updateBlockCount();
    updateScoreDisplay();

    // ============================================================
    // === RESIZE
    // ============================================================
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // ============================================================
    // === BOOT LOG
    // ============================================================
    console.log('🏗️  沙盒建造游戏 Step6 · 计分+成就系统 初始化完成');
    console.log('   🏆 计分系统 (放置+10/拆除+5)');
    console.log('   🔥 连击加成 (每5连击额外加分)');
    console.log('   ⭐ 最高分记录 (localStorage)');
    console.log('   🏅 6种成就徽章');
    console.log('   💫 分数跳数动画');
    console.log('   📊 已解锁成就:', gameState.unlocked.length, '/', ACHIEVEMENTS.length);
    console.log('   🎮 交互式 Hotbar — 点击/滚轮切换方块');
    console.log('   🔨 放置/删除双模式 — Tab 切换');
    console.log('   👁️  半透明放置预览');
    console.log('   ↩  撤销系统 (Ctrl+Z)');
    console.log('   📊 右侧信息面板');
    console.log('   ⌨️  帮助面板 (H)');
    console.log('   💬 Toast 消息反馈');
    console.log('   🖱 方块指向提示');
    console.log('   🔉 音效反馈 (切换/放置/删除/错误)');
    console.log('   📦 方块数:', blocks.length);
    console.log('   ⚡ 物理体数:', physicsBodies.length);
  </script>

  <!-- =============================================================
       === SCORE POP CONTAINER
       ============================================================= -->
  <div id="score-pop-container"></div>

  <!-- =============================================================
       === ACHIEVEMENT CONTAINER
       ============================================================= -->
  <div id="achievement-container"></div>

  <!-- =============================================================
       === COMBO INDICATOR
       ============================================================= -->
  <div id="combo-indicator"></div>

</body>

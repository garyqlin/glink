<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沙盒建造游戏 - Step3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #canvas-container { width: 100%; height: 100%; display: block; }
    #info {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      background: rgba(0,0,0,0.45);
      padding: 8px 20px;
      border-radius: 20px;
      pointer-events: none;
      user-select: none;
    }
    #block-hud {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.55);
      padding: 8px 14px;
      border-radius: 24px;
      pointer-events: none;
      user-select: none;
    }
    #block-hud .slot {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.15);
      transition: border-color 0.15s;
      image-rendering: pixelated;
      background-size: cover;
    }
    #block-hud .slot.active {
      border-color: #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <!-- === HTML STRUCTURE === -->
  <div id="canvas-container"></div>
  <div id="info">🖱 左键放置 | 🖱 右键删除 | 🔢 1-6切换 | 🎨 像素风贴图 · Step3</div>

  <!-- === BLOCK HUD === -->
  <div id="block-hud">
    <div class="slot active" id="slot-0" title="草方块 (1)"></div>
    <div class="slot" id="slot-1" title="泥土 (2)"></div>
    <div class="slot" id="slot-2" title="木材 (3)"></div>
    <div class="slot" id="slot-3" title="石头 (4)"></div>
    <div class="slot" id="slot-4" title="砖块 (5)"></div>
    <div class="slot" id="slot-5" title="玻璃 (6)"></div>
  </div>

  <!-- === THREE.JS IMPORT MAP === -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- === CANNON-ES (UMD → window.CANNON) === -->
  <script src="https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"></script>

  <!-- === MAIN SCRIPT (ESM) === -->
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ============================================================
    // === DOM REFS ===
    // ============================================================
    const container = document.getElementById('canvas-container');

    // ============================================================
    // === SCENE SETUP ===
    // ============================================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 30, 150);

    // ============================================================
    // === CAMERA ===
    // ============================================================
    const camera = new THREE.PerspectiveCamera(
      60,
      container.clientWidth / container.clientHeight,
      0.1,
      1000
    );
    camera.position.set(10, 8, 10);
    camera.lookAt(0, 0, 0);

    // ============================================================
    // === RENDERER ===
    // ============================================================
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // ============================================================
    // === ORBIT CONTROLS ===
    // ============================================================
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.enablePan = false;
    controls.enableRotate = true;
    controls.enableZoom = true;
    controls.minPolarAngle = THREE.MathUtils.degToRad(5);
    controls.maxPolarAngle = THREE.MathUtils.degToRad(85);
    controls.target.set(0, 0, 0);
    controls.update();

    // ============================================================
    // === LIGHTING ===
    // ============================================================
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffee, 0.8);
    directionalLight.position.set(50, 100, 50);
    directionalLight.castShadow = true;

    directionalLight.shadow.mapSize.width = 2048;
    directionalLight.shadow.mapSize.height = 2048;
    directionalLight.shadow.camera.near = 0.5;
    directionalLight.shadow.camera.far = 200;
    directionalLight.shadow.camera.left = -60;
    directionalLight.shadow.camera.right = 60;
    directionalLight.shadow.camera.top = 60;
    directionalLight.shadow.camera.bottom = -60;
    directionalLight.shadow.bias = -0.0005;
    directionalLight.shadow.normalBias = 0.02;

    scene.add(directionalLight);

    // ============================================================
    // === GROUND — 草地平面 ===
    // ============================================================

    function createGroundTexture(size = 512) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#4a8c3f';
      ctx.fillRect(0, 0, size, size);

      for (let i = 0; i < 8000; i++) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        const shade = 100 + Math.floor(Math.random() * 80);
        const r = 30 + Math.floor(Math.random() * 40);
        const g = shade;
        const b = 20 + Math.floor(Math.random() * 30);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(x, y, 2 + Math.random() * 3, 2 + Math.random() * 3);
      }

      for (let i = 0; i < 400; i++) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        const shade = 30 + Math.floor(Math.random() * 30);
        ctx.fillStyle = `rgba(${shade},${shade + 15},${shade},0.4)`;
        ctx.beginPath();
        ctx.arc(x, y, 2 + Math.random() * 6, 0, Math.PI * 2);
        ctx.fill();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(40, 40);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    const groundTexture = createGroundTexture();

    const groundGeometry = new THREE.PlaneGeometry(100, 100);
    const groundMaterial = new THREE.MeshStandardMaterial({
      map: groundTexture,
      roughness: 0.9,
      metalness: 0.0,
      color: new THREE.Color(0xffffff),
    });

    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.01;
    ground.receiveShadow = true;
    scene.add(ground);

    // ============================================================
    // === PHYSICS WORLD (Cannon-es) ===
    // ============================================================
    const CANNON = window.CANNON;

    const world = new CANNON.World();
    world.gravity.set(0, -9.82, 0);
    world.broadphase = new CANNON.NaiveBroadphase();
    world.solver.iterations = 10;
    world.defaultContactMaterial.restitution = 0.3;

    const groundBody = new CANNON.Body({
      type: CANNON.Body.STATIC,
      shape: new CANNON.Plane(),
    });
    groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
    world.addBody(groundBody);

    const physicsBodies = [];

    // ============================================================
    // === RENDER / PHYSICS LOOP ===
    // ============================================================
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.1);
      world.step(1 / 60, delta, 3);

      for (const { mesh, body } of physicsBodies) {
        mesh.position.copy(body.position);
        mesh.quaternion.copy(body.quaternion);
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // ============================================================
    // === PLACEMENT SYSTEM ===
    // ============================================================

    const GRID_SIZE = 1;
    const MAX_HEIGHT = 20;

    const BLOCK_TYPES = {
      grass: { color: 0x4CAF50, name: '草方块', opacity: 1.0, roughness: 0.9 },
      dirt:  { color: 0x795548, name: '泥土',   opacity: 1.0, roughness: 0.95 },
      wood:  { color: 0x8D6E63, name: '木材',   opacity: 1.0, roughness: 0.8 },
      stone: { color: 0x9E9E9E, name: '石头',   opacity: 1.0, roughness: 0.95 },
      brick: { color: 0xC62828, name: '砖块',   opacity: 1.0, roughness: 0.9 },
      glass: { color: 0x81D4FA, name: '玻璃',   opacity: 0.5, roughness: 0.2 },
    };

    const BLOCK_TYPE_KEYS = Object.keys(BLOCK_TYPES);

    let currentType = 'grass';
    const blocks = [];

    // ============================================================
    // === TEXTURE SYSTEM ===
    // ============================================================

    const TEX_SIZE = 64; // 像素风贴图尺寸
    const textureCache = {}; // 纹理缓存，避免每帧重绘

    /**
     * 用 Canvas 2D 程序生成像素风材质贴图
     * @param {string} type — 材质类型: grass / dirt / wood / stone / brick / glass
     * @returns {THREE.CanvasTexture}
     */
    function generateMaterialTexture(type) {
      // 缓存命中直接返回
      if (textureCache[type]) return textureCache[type];

      const canvas = document.createElement('canvas');
      canvas.width = TEX_SIZE;
      canvas.height = TEX_SIZE;
      const ctx = canvas.getContext('2d');

      switch (type) {
        // ── 草皮顶面：绿底 + 草叶点阵 ──
        case 'grass': {
          ctx.fillStyle = '#5a9e3f';
          ctx.fillRect(0, 0, TEX_SIZE, TEX_SIZE);

          // 草叶 — 绿色短竖线点阵
          for (let i = 0; i < 350; i++) {
            const x = Math.floor(Math.random() * TEX_SIZE);
            const y = Math.floor(Math.random() * TEX_SIZE);
            const h = 2 + Math.floor(Math.random() * 5);
            const shade = 140 + Math.floor(Math.random() * 60);
            ctx.fillStyle = `rgb(30,${shade},20)`;
            ctx.fillRect(x, y, 1 + Math.floor(Math.random() * 2), h);
          }

          // 浅色草尖点缀
          for (let i = 0; i < 180; i++) {
            const x = Math.floor(Math.random() * TEX_SIZE);
            const y = Math.floor(Math.random() * TEX_SIZE);
            ctx.fillStyle = '#7ec850';
            ctx.fillRect(x, y, 2, 1);
          }

          // 泥土露点
          for (let i = 0; i < 40; i++) {
            const x = Math.floor(Math.random() * TEX_SIZE);
            const y = Math.floor(Math.random() * TEX_SIZE);
            ctx.fillStyle = '#6B4226';
            ctx.fillRect(x, y, 2, 2);
          }
          break;
        }

        // ── 泥土：全棕 + 深棕颗粒点阵 ──
        case 'dirt': {
          ctx.fillStyle = '#8B5E3C';
          ctx.fillRect(0, 0, TEX_SIZE, TEX_SIZE);

          // 深棕色随机颗粒
          for (let i = 0; i < 650; i++) {
            const x = Math.floor(Math.random() * TEX_SIZE);
            const y = Math.floor(Math.random() * TEX_SIZE);
            const shade = 55 + Math.floor(Math.random() * 45);
            ctx.fillStyle = `rgb(${shade},${Math.floor(shade * 0.55)},${Math.floor(shade * 0.28)})`;
            ctx.fillRect(x, y, 1 + Math.floor(Math.random() * 3), 1 + Math.floor(Math.random() * 3));
          }

          // 浅色沙粒
          for (let i = 0; i < 120; i++) {
            const x = Math.floor(Math.random() * TEX_SIZE);
            const y = Math.floor(Math.random() * TEX_SIZE);
            ctx.fillStyle = '#B8956E';
            ctx.fillRect(x, y, 1, 1);
          }

          // 小石子
          for (let i = 0; i < 25; i++) {
            const x = Math.floor(Math.random() * TEX_SIZE);
            const y = Math.floor(Math.random() * TEX_SIZE);
            ctx.fillStyle = '#666';
            ctx.beginPath();
            ctx.arc(x, y, 1.5 + Math.random() * 3, 0, Math.PI * 2);
            ctx.fill();
          }
          break;
        }

        // ── 木材：棕底 + 木纹水平线 + 年轮点 ──
        case 'wood': {
          ctx.fillStyle = '#B8860B';
          ctx.fillRect(0, 0, TEX_SIZE, TEX_SIZE);

          // 木纹水平线条
          for (let y = 0; y < TEX_SIZE; y += 3 + Math.floor(Math.random() * 5)) {
            const shade = 145 + Math.floor(Math.random() * 35);
            const w = 0.4 + Math.random() * 0.3;
            ctx.fillStyle = `rgb(${shade},${Math.floor(shade * 0.72)},${Math.floor(shade * 0.38)})`;
            ctx.fillRect(0, y, TEX_SIZE, 1 + Math.floor(Math.random() * 3));
          }

          // 深色竖纹
          for (let i = 0; i < 8; i++) {
            const x = Math.floor(Math.random() * TEX_SIZE);
            ctx.fillStyle = 'rgba(80,40,10,0.15)';
            ctx.fillRect(x, 0, 1 + Math.floor(Math.random() * 3), TEX_SIZE);
          }

          // 年轮眼（椭圆环）
          for (let n = 0; n < 3; n++) {
            const cx = 10 + Math.floor(Math.random() * 44);
            const cy = 8 + Math.floor(Math.random() * 48);
            for (let r = 2; r <= 8; r += 2) {
              ctx.strokeStyle = `rgba(90,45,15,${0.35 - r * 0.03})`;
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.ellipse(cx, cy, r, r * 0.5, 0, 0, Math.PI * 2);
              ctx.stroke();
            }
            // 年轮中心点
            ctx.fillStyle = '#4a2a10';
            ctx.fillRect(cx - 1, cy - 1, 2, 2);
          }
          break;
        }

        // ── 石头：灰色 + 随机深灰斑点 ──
        case 'stone': {
          ctx.fillStyle = '#808080';
          ctx.fillRect(0, 0, TEX_SIZE, TEX_SIZE);

          // 深灰斑点
          for (let i = 0; i < 220; i++) {
            const x = Math.floor(Math.random() * TEX_SIZE);
            const y = Math.floor(Math.random() * TEX_SIZE);
            const shade = 65 + Math.floor(Math.random() * 40);
            ctx.fillStyle = `rgb(${shade},${shade},${shade})`;
            const s = 2 + Math.floor(Math.random() * 5);
            ctx.fillRect(x, y, s, s);
          }

          // 浅灰亮点
          for (let i = 0; i < 90; i++) {
            const x = Math.floor(Math.random() * TEX_SIZE);
            const y = Math.floor(Math.random() * TEX_SIZE);
            ctx.fillStyle = '#A8A8A8';
            ctx.fillRect(x, y, 1 + Math.floor(Math.random() * 2), 1);
          }

          // 裂缝线
          for (let i = 0; i < 4; i++) {
            const sx = Math.floor(Math.random() * 50);
            const sy = Math.floor(Math.random() * 50);
            const ex = sx + 4 + Math.floor(Math.random() * 18);
            const ey = sy + 2 + Math.floor(Math.random() * 12);
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(ex, ey);
            ctx.stroke();
          }
          break;
        }

        // ── 砖块：红砖 + 灰白砂浆线（半砖交错） ──
        case 'brick': {
          ctx.fillStyle = '#B44040';
          ctx.fillRect(0, 0, TEX_SIZE, TEX_SIZE);

          const BRICK_H = 16; // 砖高（含砂浆）
          const ROWS = TEX_SIZE / BRICK_H; // 4行

          // 砖块表面细微纹理
          for (let i = 0; i < 350; i++) {
            const x = Math.floor(Math.random() * TEX_SIZE);
            const y = Math.floor(Math.random() * TEX_SIZE);
            const shade = 140 + Math.floor(Math.random() * 50);
            ctx.fillStyle = `rgb(${shade},${Math.floor(shade * 0.28)},${Math.floor(shade * 0.28)})`;
            ctx.fillRect(x, y, 1 + Math.random() * 2, 1);
          }

          // 水平砂浆线
          for (let row = 0; row <= ROWS; row++) {
            const y = row * BRICK_H;
            ctx.fillStyle = '#C8C0B8';
            ctx.fillRect(0, y, TEX_SIZE, 2);
          }

          // 垂直砂浆线（半砖交错）
          for (let row = 0; row < ROWS; row++) {
            const y = row * BRICK_H + 2; // 跳过水平砂浆
            const h = BRICK_H - 4;
            const offset = (row % 2 === 0) ? 0 : 8; // 偶数行从0开始，奇数行偏移半砖
            for (let x = offset; x < TEX_SIZE; x += 16) {
              ctx.fillStyle = '#C8C0B8';
              ctx.fillRect(x, y, 2, h);
            }
          }
          break;
        }

        // ── 玻璃：半透明蓝 + 边框 + 高光斜线 ──
        case 'glass': {
          // 半透明蓝色底
          ctx.fillStyle = 'rgba(120, 200, 240, 0.30)';
          ctx.fillRect(0, 0, TEX_SIZE, TEX_SIZE);

          // 边框
          ctx.strokeStyle = 'rgba(175, 225, 250, 0.65)';
          ctx.lineWidth = 3;
          ctx.strokeRect(2, 2, TEX_SIZE - 4, TEX_SIZE - 4);

          // 内框细线
          ctx.strokeStyle = 'rgba(200, 240, 255, 0.35)';
          ctx.lineWidth = 1;
          ctx.strokeRect(5, 5, TEX_SIZE - 10, TEX_SIZE - 10);

          // 高光斜线（45° 对角线）
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
          ctx.lineWidth = 2;
          for (let i = 0; i < 6; i++) {
            const offset = -28 + i * 16;
            ctx.beginPath();
            ctx.moveTo(offset, 0);
            ctx.lineTo(offset + TEX_SIZE, TEX_SIZE);
            ctx.stroke();
          }
          break;
        }

        default:
          // 兜底：灰色纯色
          ctx.fillStyle = '#888888';
          ctx.fillRect(0, 0, TEX_SIZE, TEX_SIZE);
          break;
      }

      // 创建 Three.js 纹理，像素风使用 NearestFilter
      const texture = new THREE.CanvasTexture(canvas);
      texture.magFilter = THREE.NearestFilter;
      texture.minFilter = THREE.NearestFilter;
      texture.wrapS = THREE.ClampToEdgeWrapping;
      texture.wrapT = THREE.ClampToEdgeWrapping;
      texture.colorSpace = THREE.SRGBColorSpace;

      // 写入缓存
      textureCache[type] = texture;
      return texture;
    }

    // ── 预生成全部纹理（只执行一次） ──
    const grassTopTex    = generateMaterialTexture('grass');
    const dirtTex        = generateMaterialTexture('dirt');
    const woodTex        = generateMaterialTexture('wood');
    const stoneTex       = generateMaterialTexture('stone');
    const brickTex       = generateMaterialTexture('brick');
    const glassTex       = generateMaterialTexture('glass');

    // ── 构建材质缓存 ──
    // grass：多材质 — 顶面(+Y)用草皮，其他面用泥土
    const grassSideMat = new THREE.MeshStandardMaterial({
      map: dirtTex, roughness: 0.9, metalness: 0.0,
    });
    const grassTopMat = new THREE.MeshStandardMaterial({
      map: grassTopTex, roughness: 0.9, metalness: 0.0,
    });
    // BoxGeometry 面顺序: [+X, -X, +Y, -Y, +Z, -Z]
    const grassMaterials = [
      grassSideMat, grassSideMat, // +X, -X
      grassTopMat,                 // +Y (顶面)
      grassSideMat,                // -Y (底面)
      grassSideMat, grassSideMat, // +Z, -Z
    ];

    const blockMaterials = {};
    blockMaterials['grass'] = grassMaterials;
    blockMaterials['dirt']  = new THREE.MeshStandardMaterial({ map: dirtTex,  roughness: 0.95, metalness: 0.0 });
    blockMaterials['wood']  = new THREE.MeshStandardMaterial({ map: woodTex,  roughness: 0.8,  metalness: 0.0 });
    blockMaterials['stone'] = new THREE.MeshStandardMaterial({ map: stoneTex, roughness: 0.95, metalness: 0.0 });
    blockMaterials['brick'] = new THREE.MeshStandardMaterial({ map: brickTex, roughness: 0.9,  metalness: 0.0 });
    blockMaterials['glass'] = new THREE.MeshStandardMaterial({
      map: glassTex, roughness: 0.2, metalness: 0.2,
      transparent: true, opacity: 0.5,
    });

    // ── HUD 预览用缩略图（16×16 超小像素贴图） ──
    const HUD_KEYS = ['grass', 'dirt', 'wood', 'stone', 'brick', 'glass'];
    HUD_KEYS.forEach((type, i) => {
      const slot = document.getElementById(`slot-${i}`);
      if (!slot) return;
      const tex = textureCache[type];
      if (tex) {
        // 从已缓存的 Canvas 中取 source
        const srcCanvas = tex.source.data;
        if (srcCanvas) {
          // 缩小到 32×32 作为 CSS 背景
          const thumb = document.createElement('canvas');
          thumb.width = 32;
          thumb.height = 32;
          const tctx = thumb.getContext('2d');
          tctx.imageSmoothingEnabled = false; // 像素风
          tctx.drawImage(srcCanvas, 0, 0, 32, 32);
          slot.style.backgroundImage = `url(${thumb.toDataURL()})`;
        }
      }
    });

    console.log('🎨 纹理缓存:', Object.keys(textureCache).length, '种');
    console.log('   grass → 顶面草皮 + 侧面泥土 (多材质)');
    console.log('   dirt  → 棕色颗粒点阵 (粗糙度 0.95)');
    console.log('   wood  → 木纹水平线+年轮 (粗糙度 0.8)');
    console.log('   stone → 灰色斑点+裂缝 (粗糙度 0.95)');
    console.log('   brick → 红砖半砖交错 (粗糙度 0.9)');
    console.log('   glass → 半透明蓝+高光斜线 (metalness:0.2, opacity:0.5)');

    // ============================================================
    // === MESH & PHYSICS ===
    // ============================================================

    const blockGeometry = new THREE.BoxGeometry(GRID_SIZE, GRID_SIZE, GRID_SIZE);

    const gridHelper = new THREE.GridHelper(40, 40, 0x666666, 0x999999);
    gridHelper.position.y = 0.001;
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.35;
    scene.add(gridHelper);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

    let currentIntersection = null;

    function updateRaycaster(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const blockMeshes = blocks.map(b => b.mesh);
      const blockHits = raycaster.intersectObjects(blockMeshes, false);

      if (blockHits.length > 0) {
        const hit = blockHits[0];
        currentIntersection = {
          point: hit.point.clone(),
          normal: hit.face.normal.clone(),
          object: hit.object,
          mode: 'block',
        };
        return;
      }

      const groundTarget = new THREE.Vector3();
      const hitGround = raycaster.ray.intersectPlane(groundPlane, groundTarget);

      if (hitGround) {
        currentIntersection = {
          point: groundTarget.clone(),
          normal: new THREE.Vector3(0, 1, 0),
          object: null,
          mode: 'ground',
        };
      } else {
        currentIntersection = null;
      }
    }

    function getPlacementPosition(intersection) {
      const pos = new THREE.Vector3();

      if (intersection.mode === 'ground') {
        pos.x = Math.round(intersection.point.x);
        pos.y = 0.5;
        pos.z = Math.round(intersection.point.z);
      } else if (intersection.mode === 'block') {
        pos.copy(intersection.point).add(
          intersection.normal.clone().multiplyScalar(GRID_SIZE)
        );
        pos.x = Math.round(pos.x);
        pos.y = Math.round(pos.y);
        pos.z = Math.round(pos.z);
      }

      return pos;
    }

    function isPositionOccupied(position) {
      for (const b of blocks) {
        if (b.mesh.position.distanceTo(position) < 0.1) return true;
      }
      return false;
    }

    function placeBlock(type, position) {
      if (position.y >= MAX_HEIGHT) return false;
      if (position.y < 0.5) return false;
      if (isPositionOccupied(position)) return false;

      const mesh = new THREE.Mesh(blockGeometry, blockMaterials[type]);
      mesh.position.copy(position);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      const halfExtents = new CANNON.Vec3(0.5, 0.5, 0.5);
      const shape = new CANNON.Box(halfExtents);
      const body = new CANNON.Body({
        mass: 0,
        shape: shape,
      });
      body.position.set(position.x, position.y, position.z);
      world.addBody(body);

      blocks.push({ mesh, body, type });
      return true;
    }

    function removeBlock(mesh) {
      const idx = blocks.findIndex(b => b.mesh === mesh);
      if (idx === -1) return false;

      const block = blocks[idx];
      scene.remove(block.mesh);
      world.removeBody(block.body);

      blocks.splice(idx, 1);
      return true;
    }

    // --- Web Audio API 合成 beep 音效 ---
    let audioCtx = null;

    function getAudioContext() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AC();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    }

    function playBeep(freq, duration, volume = 0.12) {
      try {
        const ctx = getAudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime);

        gain.gain.setValueAtTime(volume, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + duration);
      } catch (_) {
        // 静默忽略
      }
    }

    // --- HUD 更新 ---
    const hudSlots = document.querySelectorAll('#block-hud .slot');

    function updateHUD() {
      const typeIdx = BLOCK_TYPE_KEYS.indexOf(currentType);
      hudSlots.forEach((slot, i) => {
        slot.classList.toggle('active', i === typeIdx);
      });
    }

    // --- 事件处理 ---

    renderer.domElement.addEventListener('pointermove', (e) => {
      updateRaycaster(e);
    });

    let pointerDownPos = new THREE.Vector2();
    const DRAG_THRESHOLD = 3;

    renderer.domElement.addEventListener('pointerdown', (e) => {
      pointerDownPos.set(e.clientX, e.clientY);
    });

    renderer.domElement.addEventListener('click', (e) => {
      const dx = e.clientX - pointerDownPos.x;
      const dy = e.clientY - pointerDownPos.y;
      if (Math.sqrt(dx * dx + dy * dy) > DRAG_THRESHOLD) return;

      if (!currentIntersection) return;

      const pos = getPlacementPosition(currentIntersection);
      if (placeBlock(currentType, pos)) {
        playBeep(660, 0.1, 0.1);
      }
    });

    renderer.domElement.addEventListener('contextmenu', (e) => {
      e.preventDefault();

      if (!currentIntersection) return;
      if (currentIntersection.mode !== 'block') return;

      if (removeBlock(currentIntersection.object)) {
        playBeep(220, 0.15, 0.1);
        currentIntersection = null;
      }
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key;
      if (key >= '1' && key <= '6') {
        const idx = parseInt(key) - 1;
        currentType = BLOCK_TYPE_KEYS[idx];
        updateHUD();
      }
    });

    updateHUD();

    // ============================================================
    // === EVENT HANDLERS ===
    // ============================================================
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // ============================================================
    // === EXPORT (调试用) ===
    // ============================================================
    console.log('✅ 沙盒建造游戏 Step3 初始化完成 — 像素风材质贴图系统');
    console.log('   Scene children:', scene.children.length);
    console.log('   Renderer:', renderer);
    console.log('   Physics world gravity:', world.gravity);
    console.log('   Cannon-es version:', CANNON.version || 'loaded');
    console.log('   Three.js revision:', THREE.REVISION);
    console.log('   Block types:', Object.keys(BLOCK_TYPES));
    console.log('   Texture cache size:', Object.keys(textureCache).length);
    console.log('   🧱 左键放置 | ❌ 右键删除 | 🔢 1-6切换 | 🎨 像素风贴图');
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沙盒建造游戏 - Step1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #canvas-container { width: 100%; height: 100%; display: block; }
    #info {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      background: rgba(0,0,0,0.45);
      padding: 8px 20px;
      border-radius: 20px;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <!-- === HTML STRUCTURE === -->
  <div id="canvas-container"></div>
  <div id="info">🖱 左键旋转 | 🖱 滚轮缩放 | 沙盒建造 · Step1</div>

  <!-- === THREE.JS IMPORT MAP === -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- === CANNON-ES (UMD → window.CANNON) === -->
  <script src="https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"></script>

  <!-- === MAIN SCRIPT (ESM) === -->
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ============================================================
    // === DOM REFS ===
    // ============================================================
    const container = document.getElementById('canvas-container');

    // ============================================================
    // === SCENE SETUP ===
    // ============================================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 30, 150);

    // ============================================================
    // === CAMERA ===
    // ============================================================
    const camera = new THREE.PerspectiveCamera(
      60,                                       // FOV
      container.clientWidth / container.clientHeight, // Aspect
      0.1,                                      // Near
      1000                                      // Far
    );
    camera.position.set(10, 8, 10);
    camera.lookAt(0, 0, 0);

    // ============================================================
    // === RENDERER ===
    // ============================================================
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // ============================================================
    // === ORBIT CONTROLS ===
    // ============================================================
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.enablePan = false;                     // 禁止平移
    controls.enableRotate = true;                   // 允许旋转
    controls.enableZoom = true;                     // 允许缩放
    controls.minPolarAngle = THREE.MathUtils.degToRad(5);   // 仰角下限 5°
    controls.maxPolarAngle = THREE.MathUtils.degToRad(85);  // 仰角上限 85°
    controls.target.set(0, 0, 0);
    controls.update();

    // ============================================================
    // === LIGHTING ===
    // ============================================================
    // Ambient — 基础环境光
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    // Directional — 主方向光 (模拟太阳)
    const directionalLight = new THREE.DirectionalLight(0xffffee, 0.8);
    directionalLight.position.set(50, 100, 50);
    directionalLight.castShadow = true;

    // 阴影贴图配置
    directionalLight.shadow.mapSize.width = 2048;
    directionalLight.shadow.mapSize.height = 2048;
    directionalLight.shadow.camera.near = 0.5;
    directionalLight.shadow.camera.far = 200;
    directionalLight.shadow.camera.left = -60;
    directionalLight.shadow.camera.right = 60;
    directionalLight.shadow.camera.top = 60;
    directionalLight.shadow.camera.bottom = -60;
    directionalLight.shadow.bias = -0.0005;
    directionalLight.shadow.normalBias = 0.02;

    scene.add(directionalLight);

    // ============================================================
    // === GROUND — 草地平面 ===
    // ============================================================

    // 程序化草地纹理 (Canvas)
    function createGrassTexture(size = 512) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // 底色 — 草绿
      ctx.fillStyle = '#4a8c3f';
      ctx.fillRect(0, 0, size, size);

      // 随机草点纹理
      for (let i = 0; i < 8000; i++) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        // 颜色在深浅草绿间随机
        const shade = 100 + Math.floor(Math.random() * 80);
        const r = 30 + Math.floor(Math.random() * 40);
        const g = shade;
        const b = 20 + Math.floor(Math.random() * 30);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(x, y, 2 + Math.random() * 3, 2 + Math.random() * 3);
      }

      // 少量深色斑点模拟泥土/阴影
      for (let i = 0; i < 400; i++) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        const shade = 30 + Math.floor(Math.random() * 30);
        ctx.fillStyle = `rgba(${shade},${shade + 15},${shade},0.4)`;
        ctx.beginPath();
        ctx.arc(x, y, 2 + Math.random() * 6, 0, Math.PI * 2);
        ctx.fill();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(40, 40);    // 100×100的地面重复40次 ≈ 每2.5单位一个周期
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    const grassTexture = createGrassTexture();

    const groundGeometry = new THREE.PlaneGeometry(100, 100);
    const groundMaterial = new THREE.MeshStandardMaterial({
      map: grassTexture,
      roughness: 0.9,
      metalness: 0.0,
      color: new THREE.Color(0xffffff),  // 白色乘纹理原色
    });

    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;      // 放平
    ground.position.y = -0.01;             // 微低于y=0避免Z-fighting
    ground.receiveShadow = true;
    scene.add(ground);

    // ============================================================
    // === PHYSICS WORLD (Cannon-es) ===
    // ============================================================
    const CANNON = window.CANNON;

    const world = new CANNON.World();
    world.gravity.set(0, -9.82, 0);
    world.broadphase = new CANNON.NaiveBroadphase();
    world.solver.iterations = 10;
    world.defaultContactMaterial.restitution = 0.3;

    // 物理地面（静态）
    const groundBody = new CANNON.Body({
      type: CANNON.Body.STATIC,
      shape: new CANNON.Plane(),
    });
    groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0); // 放平
    world.addBody(groundBody);

    // 物理↔渲染同步用的数组（后续方块添加到这里）
    const physicsBodies = [];

    // ============================================================
    // === RENDER / PHYSICS LOOP ===
    // ============================================================
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      // 物理步进
      const delta = Math.min(clock.getDelta(), 0.1); // 防螺旋死亡
      world.step(1 / 60, delta, 3);

      // 同步物理体→渲染体
      for (const { mesh, body } of physicsBodies) {
        mesh.position.copy(body.position);
        mesh.quaternion.copy(body.quaternion);
      }

      // 控制器更新
      controls.update();

      // 渲染
      renderer.render(scene, camera);
    }

    animate();

    // ============================================================
    // === EVENT HANDLERS ===
    // ============================================================
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // ============================================================
    // === EXPORT (调试用) ===
    // ============================================================
    console.log('✅ 沙盒建造游戏 Step1 初始化完成');
    console.log('   Scene children:', scene.children.length);
    console.log('   Renderer:', renderer);
    console.log('   Physics world gravity:', world.gravity);
    console.log('   Cannon-es version:', CANNON.version || 'loaded');
    console.log('   Three.js revision:', THREE.REVISION);
  </script>
</body>
</html>
